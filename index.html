<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Fixed</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: #222; height: 45px; }
        .hp-container { width: 40%; }
        .hp-bar { height: 12px; background: #400; border: 1px solid #fff; position: relative; }
        .hp-delay { height: 100%; background: #ff0; width: 100%; position: absolute; top:0; left:0; transition: width 0.5s ease-out; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; position: absolute; top:0; left:0; transition: width 0.1s; }
        #turnCounter { text-align: center; font-size: 10px; font-weight: bold; line-height: 1.1; }
        #gameArea { width: 100%; height: 45vh; background: #111; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; object-fit: contain; }
        .slot-container { display: flex; flex-direction: column; gap: 2px; padding: 5px; height: 60px; }
        .slot-row { display: flex; gap: 2px; justify-content: center; }
        .slot { width: 18%; max-width: 60px; height: 25px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .my-slot { background: #222; }
        .en-slot { background: #422; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 5px; }
        .btn { height: 45px; background: #224; border: 2px solid #55a; color: white; font-weight: bold; border-radius: 4px; font-size: 13px; }
        .sys-btn { grid-column: span 3; background: #b00; height: 40px; }
    </style>
</head>
<body>
<div id="topUI">
    <div class="hp-container"><div class="hp-bar"><div id="myHpDelay" class="hp-delay"></div><div id="myHp" class="hp-fill"></div></div></div>
    <div id="turnCounter">TURN<br><span id="turnNum" style="font-size:14px">01</span></div>
    <div class="hp-container"><div class="hp-bar"><div id="enHpDelay" class="hp-delay"></div><div id="enHp" class="hp-fill"></div></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div class="slot-container">
    <div id="mySlotArea" class="slot-row"></div>
    <div id="enSlotArea" class="slot-row"></div>
</div>
<div id="controls">
    <button class="btn" onclick="addCmd('punch')">PUNCH</button>
    <button class="btn" onclick="addCmd('upper')">UPPER</button>
    <button class="btn" onclick="addCmd('guard')">GUARD</button>
    <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    <button class="btn sys-btn" style="background:#555;" onclick="resetCmd()">RESET</button>
</div>

<script>
const DMG = { PUNCH: 10, UPPER: 5, METEOR: 50 };
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { pCur: 'player', x: 100, y: 200, shake: 0, hp: 100, isPlaying: false, lastPunch: 'punch2' };
const e = { pCur: 'player', x: 660, y: 200, shake: 0, hp: 100 };
const imgs = {};
let myHands = [], enHands = [], turn = 1, airCombo = false;

async function loadImages() {
    const names = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash','damage'];
    await Promise.all(names.map(n => new Promise(r => { const i = new Image(); i.src = n + '.PNG'; i.onload = () => { imgs[n] = i; r(); }; })));
}

function updateMySlots() { document.getElementById('mySlotArea').innerHTML = myHands.map(h => `<div class="slot my-slot">${h.toUpperCase()}</div>`).join(''); }
function updateEnSlots() { document.getElementById('enSlotArea').innerHTML = enHands.map(h => `<div class="slot en-slot">${h.toUpperCase()}</div>`).join(''); }
function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateMySlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; enHands = []; updateMySlots(); updateEnSlots(); } }

function applyDmg(target, val, isAttacker = false) {
    target.hp = Math.max(0, target.hp - val); target.shake = 100;
    if(isAttacker) s.shake = 50;
    const bar = (target === s) ? 'myHp' : 'enHp';
    const delay = (target === s) ? 'myHpDelay' : 'enHpDelay';
    document.getElementById(bar).style.width = target.hp + '%';
    setTimeout(() => document.getElementById(delay).style.width = target.hp + '%', 500);
}

async function animateVersus(pX, eX, dur, pP, eP) {
    const sX = s.x, eX_s = e.x, start = Date.now();
    while(Date.now() - start < dur) {
        let pr = (Date.now() - start) / dur, ease = 1 - Math.pow(1 - pr, 3);
        s.x = sX + (pX - sX) * ease; e.x = eX_s + (eX - eX_s) * ease;
        s.pCur = pP; e.pCur = eP; await new Promise(r => setTimeout(r, 16));
    }
}

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;
    enHands = myHands.map(() => ['punch','upper','guard'][Math.floor(Math.random()*3)]);
    updateEnSlots();

    try {
        airCombo = false; let airStep = 0, comboCount = 0;
        for (let i = 0; i < myHands.length; i++) {
            let p = myHands[i], eA = enHands[i];
            
            // 攻撃時の前進・後退
            await animateVersus(300, 460, 150, 'dash', 'dash');

            // 空中コンボロジック
            if (airCombo) {
                airStep++; s.y = 50; e.y = 50;
                s.pCur = (s.lastPunch === 'punch') ? 'punch2' : 'punch';
                s.lastPunch = s.pCur; e.pCur = 'damage';
                if (p === 'punch' && airStep <= 3) {
                    if (airStep === 3) { s.pCur = 'knock'; e.pCur = 'damage'; await new Promise(r => setTimeout(r, 300)); s.y = 200; e.y = 200; airCombo = false; applyDmg(e, DMG.METEOR, true); await new Promise(r => setTimeout(r, 600)); }
                    else { applyDmg(e, DMG.UPPER, true); await new Promise(r => setTimeout(r, 300)); }
                } else { s.y = 200; e.y = 200; airCombo = false; }
                continue;
            }

            // 敵の行動
            if (eA === 'upper') {
                e.pCur = 'upper';
                for(let j=0; j<=20; j++) { 
                    e.y = 200 - (50 * Math.sin((j/20)*Math.PI/2)); 
                    s.y = 200 - (150 * Math.sin((j/20)*Math.PI/2)); 
                    s.pCur = 'damage'; await new Promise(r => setTimeout(r, 20)); 
                }
                e.y = 200; s.y = 200; e.pCur = 'player'; s.pCur = 'player';
            }
            
            // プレイヤー攻撃
            if (p === 'upper' && eA !== 'guard' && !airCombo) {
                for(let j=0; j<=20; j++) { 
                    e.y = 200 - (150 * Math.sin((j/20)*Math.PI/2)); 
                    s.y = 200 - (50 * Math.sin((j/20)*Math.PI/2)); 
                    e.pCur = 'damage'; s.pCur = 'upper'; await new Promise(r => setTimeout(r, 20)); 
                }
                if (myHands[i+1] === 'punch') { airCombo = true; airStep = 0; s.y = 50; e.y = 50; }
                else { s.y = 200; e.y = 200; s.pCur = 'player'; }
            } else if (p === 'punch' && eA !== 'guard') {
                e.pCur = 'damage'; applyDmg(e, DMG.PUNCH, true); await new Promise(r => setTimeout(r, 300)); e.pCur = 'player';
            }
        }
    } finally {
        await animateVersus(100, 660, 300, 'player', 'player');
        s.y = 200; e.y = 200; s.isPlaying = false; turn++; 
        document.getElementById('turnNum').innerText = String(turn).padStart(2, '0');
        resetCmd();
    }
}

function loop() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    [s, e].forEach((o, idx) => {
        const img = imgs[o.pCur];
        if (img) {
            ctx.save();
            if (idx === 1) { ctx.scale(-1, 1); ctx.drawImage(img, -o.x - 250, o.y + (Math.random()-0.5)*o.shake, 250, 250); }
            else { ctx.drawImage(img, o.x, o.y + (Math.random()-0.5)*o.shake, 250, 250); }
            ctx.restore();
        }
        o.shake *= 0.85;
    });
    requestAnimationFrame(loop);
}

loadImages().then(() => loop());
</script>
</body>
</html>
