<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Permanent Damage Engine</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 5px; background: #222; height: 40px; flex-shrink: 0; }
        .hp-container { width: 42%; }
        .hp-bar { height: 10px; background: #400; border: 1px solid #fff; position: relative; }
        .hp-delay { height: 100%; background: #ff0; width: 100%; position: absolute; top:0; left:0; transition: width 0.5s ease-out; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; position: absolute; top:0; left:0; transition: width 0.1s; }
        #turnCounter { text-align: center; font-size: 8px; font-weight: bold; line-height: 1; }
        #gameArea { flex-grow: 1; width: 100%; background: #111; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; object-fit: contain; }
        .slot-container { height: 40px; display: flex; flex-direction: column; gap: 1px; padding: 2px; flex-shrink: 0; }
        .slot-row { display: flex; gap: 1px; justify-content: center; }
        .slot { width: 18%; max-width: 50px; height: 18px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 8px; }
        .my-slot { background: #222; }
        .en-slot { background: #422; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 5px; flex-shrink: 0; }
        .btn { height: 40px; background: #224; border: 1px solid #55a; color: white; font-weight: bold; border-radius: 4px; font-size: 12px; }
        .sys-btn { grid-column: span 3; background: #b00; height: 35px; }
    </style>
</head>
<body>
<div id="topUI">
    <div class="hp-container"><div class="hp-bar"><div id="myHpDelay" class="hp-delay"></div><div id="myHp" class="hp-fill"></div></div></div>
    <div id="turnCounter">TURN<br><span id="turnNum" style="font-size:12px">01</span></div>
    <div class="hp-container"><div class="hp-bar"><div id="enHpDelay" class="hp-delay"></div><div id="enHp" class="hp-fill"></div></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div class="slot-container">
    <div id="mySlotArea" class="slot-row"></div>
    <div id="enSlotArea" class="slot-row"></div>
</div>
<div id="controls">
    <button class="btn" onclick="addCmd('punch')">PUNCH</button>
    <button class="btn" onclick="addCmd('upper')">UPPER</button>
    <button class="btn" onclick="addCmd('guard')">GUARD</button>
    <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    <button class="btn sys-btn" style="background:#555;" onclick="resetCmd()">RESET</button>
</div>

<script>
/** 
 * [永続仕様・動作リスト]
 * 1. ダメージ計算: PUNCH(10), UPPER(5), METEOR(50)基準。コンボに応じ補正。ガード時は無効(0)。
 * 2. ダメージ演出: applyDmg 実行時に必ず target.shake = 100 を設定し画像を揺らすこと。
 * 3. 画像切替: 空中コンボ中の punch/punch2 交互トグル。
 * 4. アッパー: 実行時は必ず画像 'upper' を使用。
 * 5. 物理: 着地座標 y=200 への復帰を finally で保証。
 * 6. 描画: imageSmoothingEnabled = false で鮮明化。
 */
const DMG = { PUNCH: 10, UPPER: 5, METEOR: 50 };
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { pCur: 'player', x: 100, y: 200, shake: 0, hp: 100, isPlaying: false, lastPunch: 'punch2' };
const e = { pCur: 'player', x: 660, y: 200, shake: 0, hp: 100 };
const imgs = {};
let myHands = [], enHands = [], turn = 1, airCombo = false;

async function loadImages() {
    const names = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash','damage'];
    await Promise.all(names.map(n => new Promise(r => { const i = new Image(); i.src = n + '.PNG'; i.onload = () => { imgs[n] = i; r(); }; })));
}

function updateMySlots() { document.getElementById('mySlotArea').innerHTML = myHands.map(h => `<div class="slot my-slot">${h.toUpperCase()}</div>`).join(''); }
function updateEnSlots() { document.getElementById('enSlotArea').innerHTML = enHands.map(h => `<div class="slot en-slot">${h.toUpperCase()}</div>`).join(''); }
function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateMySlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; enHands = []; updateMySlots(); updateEnSlots(); } }

// [永続仕様] ダメージ時は確定で shake を付与
function applyDmg(target, val) {
    target.hp = Math.max(0, target.hp - val); 
    target.shake = 100; // 確定揺れ
    document.getElementById(target === s ? 'myHp' : 'enHp').style.width = target.hp + '%';
    setTimeout(() => document.getElementById(target === s ? 'myHpDelay' : 'enHpDelay').style.width = target.hp + '%', 500);
}

async function animateVersus(pX, eX, dur, pP, eP) {
    const sX = s.x, eX_s = e.x, start = Date.now();
    while(Date.now() - start < dur) {
        let pr = (Date.now() - start) / dur, ease = 1 - Math.pow(1 - pr, 3);
        s.x = sX + (pX - sX) * ease; e.x = eX_s + (eX - eX_s) * ease;
        s.pCur = pP; e.pCur = eP; await new Promise(r => setTimeout(r, 16));
    }
}

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;
    enHands = myHands.map(() => ['punch','upper','guard'][Math.floor(Math.random()*3)]);
    updateEnSlots();

    try {
        airCombo = false; let airStep = 0;
        for (let i = 0; i < myHands.length; i++) {
            let p = myHands[i], eA = enHands[i];
            if (!airCombo) { s.y = 200; e.y = 200; }
            await animateVersus(300, 460, 150, 'dash', 'dash');

            if (airCombo) {
                airStep++; s.y = 50; e.y = 50;
                s.pCur = (s.lastPunch === 'punch') ? 'punch2' : 'punch';
                s.lastPunch = s.pCur; e.pCur = 'damage';
                if (p === 'punch' && airStep <= 3) {
                    if (airStep === 3) { s.pCur = 'knock'; e.pCur = 'damage'; await new Promise(r => setTimeout(r, 300)); s.y = 200; e.y = 200; airCombo = false; applyDmg(e, DMG.METEOR + 10); await new Promise(r => setTimeout(r, 600)); }
                    else { applyDmg(e, DMG.PUNCH + (airStep * 5)); await new Promise(r => setTimeout(r, 300)); }
                } else { s.y = 200; e.y = 200; airCombo = false; }
                continue;
            }

            if (p === 'upper' && eA !== 'guard') {
                s.pCur = 'upper'; 
                for(let j=0; j<=20; j++) { e.y = 200 - (150 * Math.sin((j/20)*Math.PI/2)); s.y = 200 - (30 * Math.sin((j/20)*Math.PI/2)); e.pCur = 'damage'; await new Promise(r => setTimeout(r, 20)); }
                if (myHands[i+1] === 'punch') { airCombo = true; airStep = 0; } else { s.y = 200; e.y = 200; }
            } else if (p === 'punch' && eA !== 'guard') {
                s.pCur = 'punch'; applyDmg(e, DMG.PUNCH); await new Promise(r => setTimeout(r, 300));
            } else {
                s.pCur = 'player'; await new Promise(r => setTimeout(r, 300));
            }
        }
    } finally {
        await animateVersus(100, 660, 300, 'player', 'player');
        s.y = 200; e.y = 200; s.isPlaying = false; turn++; 
        document.getElementById('turnNum').innerText = String(turn).padStart(2, '0');
        resetCmd();
    }
}

function loop() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    [s, e].forEach((o, idx) => {
        const img = imgs[o.pCur];
        if (img) {
            ctx.save();
            if (idx === 1) { ctx.scale(-1, 1); ctx.drawImage(img, -o.x - 250, o.y + (Math.random()-0.5)*o.shake, 250, 250); }
            else { ctx.drawImage(img, o.x, o.y + (Math.random()-0.5)*o.shake, 250, 250); }
            ctx.restore();
        }
        o.shake *= 0.85;
    });
    requestAnimationFrame(loop);
}

loadImages().then(() => loop());
</script>
</body>
</html>
