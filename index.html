<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Fixed</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; touch-action: none; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// 1. リソース管理
const imgs = {};
const files = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'];
files.forEach(f => {
    imgs[f] = new Image();
    imgs[f].src = f + '.PNG';
});

// 2. 状態管理
let state = {
    cur: 'player', // 画像ID
    dash: false, air: false,
    x: 0, y: 0, vy: 0,
    shake: 0, gShake: 0, mShake: 0
};
let dashTimer = null, actionTimer = null;

// 3. アクション制御
function playAction(type) {
    if (type === 'punch') {
        // コンボ: dashを一瞬挟む
        if (state.cur === 'punch') {
            state.cur = 'dash';
            setTimeout(() => state.cur = 'punch2', 100);
        } else {
            state.cur = 'punch';
        }
        state.shake = 15;
        clearTimeout(actionTimer);
        actionTimer = setTimeout(() => { if(!state.air) state.cur = 'player'; }, 400);
        
        // 空中パンチならスロー演出
        if (state.air) state.vy = -2; 
    }
    else if (type === 'upper' && !state.air) {
        state.cur = 'upper'; state.air = true; state.vy = -20;
        setTimeout(() => state.cur = 'upper2', 200);
    }
    else if (type === 'knock' && state.air) {
        state.cur = 'knock'; state.mShake = 80; state.vy = 10;
    }
    else if (type === 'guard' && !state.air) {
        state.cur = 'guard'; state.gShake = 40;
        setTimeout(() => state.cur = 'player', 300);
    }
}

function pushDash() {
    if (state.air || state.dash) return;
    state.dash = true; state.cur = 'dash';
    let d = 40;
    let t = setInterval(() => {
        state.x += d; d *= 0.8;
        if (d < 1) { clearInterval(t); state.dash = false; state.x = 0; state.cur = 'player'; }
    }, 20);
}

// 4. メインループ
function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理
    if (state.air) {
        state.vy += (state.cur.includes('punch') ? 0.2 : 1.5);
        state.y += state.vy;
        if (state.y >= 0) {
            state.y = 0; state.vy = 0; state.air = false;
            state.cur = 'player';
        }
    }

    // 描画
    let img = imgs[state.cur] || imgs['player'];
    let off = (Math.random()-0.5) * (state.shake + state.gShake + state.mShake);
    
    ctx.drawImage(img, 300 + state.x + off, 200 + state.y, 240, 240);
    
    // 減衰
    state.shake *= 0.8; state.gShake *= 0.8; state.mShake *= 0.8;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
