<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics - HP Delay</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; touch-action: manipulation; overflow: hidden; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #222; height: 40px; }
        .hp-container { width: 40%; position: relative; }
        .hp-bar { height: 12px; background: #400; border: 1px solid #fff; position: relative; }
        .hp-delay { height: 100%; background: #ff0; width: 100%; position: absolute; top:0; transition: width 0.5s ease-out; z-index: 0; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.1s; position: absolute; top:0; z-index: 1; }
        #gameArea { width: 100%; height: 35vh; background: #111; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        #slotArea { display: flex; gap: 5px; padding: 10px; height: 50px; justify-content: center; }
        .slot { width: 60px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #222; }
        .btn { height: 70px; background: #224; border: 2px solid #55a; color: white; font-weight: bold; border-radius: 8px; font-size: 16px; touch-action: manipulation; }
        .sys-btn { grid-column: span 3; background: #b00; height: 55px; font-size: 18px; }
    </style>
</head>
<body>
<div id="topUI">
    <div class="hp-container"><div class="hp-bar"><div id="myHpDelay" class="hp-delay"></div><div id="myHp" class="hp-fill"></div></div></div>
    <div id="turnCounter">TURN</div>
    <div class="hp-container"><div class="hp-bar"><div id="enHpDelay" class="hp-delay"></div><div id="enHp" class="hp-fill"></div></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="slotArea"></div>
<div id="controls" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px;">
    <button class="btn" onclick="addCmd('punch')">PUNCH</button>
    <button class="btn" onclick="addCmd('upper')">UPPER</button>
    <button class="btn" onclick="addCmd('guard')">GUARD</button>
    <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    <button class="btn sys-btn" style="background:#555;" onclick="resetCmd()">RESET</button>
</div>
<script>
// ... (前回のJSロジックをそのまま使用)
function applyDmg(target, val) {
    target.hp = Math.max(0, target.hp - val); target.shake = 100;
    if (target === s) {
        document.getElementById('myHp').style.width = s.hp + '%';
        setTimeout(() => { document.getElementById('myHpDelay').style.width = s.hp + '%'; }, 500);
    } else {
        document.getElementById('enHp').style.width = e.hp + '%';
        setTimeout(() => { document.getElementById('enHpDelay').style.width = e.hp + '%'; }, 500);
    }
}
// ... (以降、resolveBattle等の処理は前回と同じ)
</script>
</body>
</html>
