<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Finalized</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const imgs = {};
['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'].forEach(f => {
    imgs[f] = new Image(); imgs[f].src = f + '.PNG';
});

let s = {
    cur: 'player', dashX: 0, y: 0, vy: 0,
    isAir: false, isDash: false, isKnock: false,
    shake: 0, gShake: 0, mShake: 0,
    stopMotion: 0 // メテオ用停止時間
};

function playAction(type) {
    if (type === 'punch') {
        if (s.cur === 'punch') {
            s.cur = 'dash'; // Dash一瞬挟む
            setTimeout(() => { s.cur = 'punch2'; s.shake = 20; }, 100);
        } else { s.cur = 'punch'; s.shake = 15; }
        if (s.isAir) s.vy = -1; // パンチコンボ中スロー
    }
    else if (type === 'upper' && !s.isAir) {
        s.cur = 'upper'; s.isAir = true; s.vy = -20;
    }
    else if (type === 'knock' && s.isAir) {
        s.isKnock = true; s.vy = 0; s.stopMotion = 20; // ストップモーション
    }
    else if (type === 'guard' && !s.isAir) {
        s.cur = 'guard'; s.gShake = 30;
        setTimeout(() => s.cur = 'player', 300);
    }
}

function pushDash() {
    if (s.isAir || s.isDash) return;
    s.isDash = true; s.cur = 'dash';
    let d = 30;
    let t = setInterval(() => {
        s.dashX += d; d *= 0.8;
        if (d < 1) { clearInterval(t); s.isDash = false; s.cur = 'player'; }
    }, 20);
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理と停止
    if (s.isAir && s.stopMotion === 0) {
        s.vy += (s.cur.includes('punch') ? 0.2 : 1.5);
        s.y += s.vy;
        if (s.y >= 0) { s.y = 0; s.isAir = false; s.isKnock = false; s.cur = 'knock2'; setTimeout(() => s.cur = 'player', 500); }
    } else if (s.stopMotion > 0) { s.stopMotion--; if(s.stopMotion === 0) { s.cur = 'knock'; s.vy = 20; } }

    // 描画：自分
    let off = (Math.random()-0.5) * (s.shake + s.gShake + s.mShake);
    ctx.drawImage(imgs[s.cur] || imgs.player, 300 + s.dashX + off, 200 + s.y, 240, 240);
    
    // 描画：敵（反転）
    ctx.save(); ctx.translate(700, 200); ctx.scale(-1, 1);
    ctx.drawImage(imgs.player, -120, 0, 240, 240);
    ctx.restore();
    
    s.shake *= 0.8; s.gShake *= 0.8; s.mShake *= 0.8;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
