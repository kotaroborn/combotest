<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Absolute Stable</title>
    <style>
        /* レイアウト維持のためCSSは省略（ previousコード参照 ） */
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: #222; height: 45px; }
        .hp-bar { height: 12px; background: #400; border: 1px solid #fff; position: relative; width: 40%; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; position: absolute; top:0; left:0; transition: width 0.1s; }
        canvas { width: 100%; height: 45vh; image-rendering: pixelated; object-fit: contain; }
        .slot-container { height: 60px; padding: 5px; }
        .slot-row { display: flex; gap: 2px; justify-content: center; }
        .slot { width: 40px; height: 25px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .my-slot { background: #222; } .en-slot { background: #422; }
    </style>
</head>
<body>
    <div id="topUI"><div class="hp-bar"><div id="myHp" class="hp-fill"></div></div><div id="turnNum">01</div><div class="hp-bar"><div id="enHp" class="hp-fill"></div></div></div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <div class="slot-container"><div id="mySlotArea" class="slot-row"></div><div id="enSlotArea" class="slot-row"></div></div>
    <div id="controls">
        <button onclick="addCmd('punch')">PUNCH</button>
        <button onclick="addCmd('upper')">UPPER</button>
        <button onclick="resolveBattle()">GO BATTLE</button>
    </div>

<script>
const s = { x: 100, y: 200, pCur: 'player', hp: 100, isPlaying: false };
const e = { x: 660, y: 200, pCur: 'player', hp: 100 };
const imgs = {}; let myHands = [], enHands = [];

// 【重要】すべての移動・着地をこの関数で統一する
async function moveToGround(char, duration = 300) {
    const startY = char.y;
    const start = Date.now();
    while(Date.now() - start < duration) {
        let p = (Date.now() - start) / duration;
        char.y = startY + (200 - startY) * p;
        await new Promise(r => setTimeout(r, 16));
    }
    char.y = 200;
    char.pCur = 'player'; // 着地したら必ず待機ポーズ
}

async function resolveBattle() {
    if(s.isPlaying) return;
    s.isPlaying = true;
    
    for(let i=0; i<myHands.length; i++) {
        let p = myHands[i], eA = ['punch','upper','guard'][Math.floor(Math.random()*3)];
        
        // 攻撃前進
        s.x = 300; e.x = 460;
        
        if(p === 'upper') {
            s.pCur = 'upper';
            // 打ち上げモーション
            for(let j=0; j<=10; j++) {
                e.y = 200 - (150 * Math.sin(j/10 * Math.PI));
                e.pCur = 'damage';
                await new Promise(r => setTimeout(r, 30));
            }
            // 落下モーションを共通関数で保証
            await moveToGround(e, 300);
        }
        
        // ターン終了後の位置復帰も共通関数を使用
        await moveToGround(s, 200);
        await moveToGround(e, 200);
    }
    s.isPlaying = false;
    myHands = [];
}

// 描画ループは常に同じものを維持
function loop() {
    ctx.clearRect(0,0,960,540);
    [s, e].forEach((obj, idx) => {
        if(imgs[obj.pCur]) {
            ctx.save();
            if(idx === 1) ctx.scale(-1, 1);
            ctx.drawImage(imgs[obj.pCur], idx === 1 ? -obj.x - 250 : obj.x, obj.y, 250, 250);
            ctx.restore();
        }
    });
    requestAnimationFrame(loop);
}

// 初期化
(async () => {
    // 画像ロード...
    loop();
})();
</script>
</body>
</html>
