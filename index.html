<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: sans-serif; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>

<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const actionImgs = {
    idle: [new Image(), new Image()],
    punch: new Image(), punch2: new Image(),
    upper: new Image(), upper2: new Image(),
    knock: new Image(), guard: new Image(), dash: new Image()
};
actionImgs.idle[0].src = 'player.PNG'; actionImgs.idle[1].src = 'player2.PNG';
actionImgs.punch.src = 'punch.PNG'; actionImgs.punch2.src = 'punch2.PNG';
actionImgs.upper.src = 'upper.PNG'; actionImgs.upper2.src = 'upper2.PNG';
actionImgs.knock.src = 'knock.PNG'; actionImgs.guard.src = 'guard.PNG'; actionImgs.dash.src = 'dash.PNG';

let currentState = 'idle';
let tempVisualState = null;
let idleFrame = 0;
let yOffset = 0, xOffset = 0, shake = 0, isAirborne = false, meteorDrop = 0;
let actionTimeout = null;
let guardKnockback = 0, guardShake = 0;

setInterval(() => { idleFrame = (idleFrame + 1) % 2; }, 500);

function playAction(type) {
    if (currentState === 'knock') return;
    if (isAirborne && type !== 'punch' && type !== 'knock') return;

    if (actionTimeout) clearTimeout(actionTimeout);

    if (type === 'punch') {
        let prevState = currentState;
        tempVisualState = 'dash';
        setTimeout(() => { if (tempVisualState === 'dash') tempVisualState = null; }, 80);
        currentState = (prevState === 'punch') ? 'punch2' : 'punch';
        if ((prevState === 'dash' || xOffset > 0) && !isAirborne) xOffset = 140;
        shake = 5;

        actionTimeout = setTimeout(() => { 
            if (currentState === 'punch' || currentState === 'punch2') {
                if (isAirborne) currentState = (yVelocity >= 0) ? 'upper2' : 'upper';
                else { currentState = 'idle'; xOffset = 0; shake = 0; }
            }
        }, 280);
    } else if (type === 'upper') {
        currentState = 'upper'; yVelocity = -24; isAirborne = true;
    } else if (type === 'knock' && isAirborne) {
        currentState = 'knock'; isAirborne = false; yVelocity = 0; meteorDrop = 32;
    } else if (type === 'guard') {
        currentState = 'guard'; guardKnockback = -18; guardShake = 35;
        actionTimeout = setTimeout(() => { if (currentState === 'guard') { currentState = 'idle'; guardShake = 0; } }, 300);
    }
}

let yVelocity = 0;
function gameLoop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理演算
    if (isAirborne) {
        yVelocity += (currentState === 'punch' || currentState === 'punch2') ? 0.24 : 1.6; 
        yOffset += yVelocity; 
        if (yOffset >= 0) { yOffset = 0; yVelocity = 0; isAirborne = false; currentState = 'idle'; shake = 0; }
    }
    
    let drawState = tempVisualState || currentState;
    let currentImg = (drawState === 'idle') ? actionImgs.idle[idleFrame] : actionImgs[drawState];
    
    // 揺れ・ノックバックの減衰
    if (shake > 0) shake *= 0.8; if (shake < 0.1) shake = 0;
    if (guardShake > 0) guardShake *= 0.8; if (guardShake < 0.1) guardShake = 0;
    if (guardKnockback < 0) { guardKnockback += 0.8; if (guardKnockback > 0) guardKnockback = 0; }
    
    // 自キャラ描画
    let dx = (Math.random() - 0.5) * (shake + guardShake);
    let dy = (Math.random() - 0.5) * (shake + guardShake);
    ctx.drawImage(currentImg, 250 - 120 + xOffset + dx + guardKnockback, 270 - 120 + yOffset + dy, 240, 240);
    
    // 敵キャラ描画（常に描画されるようにループの最後に配置）
    let enemyImg = actionImgs.idle[0];
    ctx.save(); ctx.translate(700, 150); ctx.scale(-1, 1);
    ctx.drawImage(enemyImg, -120, -120, 240, 240); ctx.restore();
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
