<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics - Battle Engine</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .slot { display: inline-block; width: 80px; padding: 10px; border: 2px solid #333; background: white; text-align: center; margin: 5px; font-weight: bold; }
        #log { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #999; height: 350px; overflow-y: auto; font-family: monospace; }
        .damage { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h2>コマンド予約 (5手)</h2>
    <div id="slots"></div>
    <button onclick="addCommand('PUNCH')">PUNCH</button>
    <button onclick="addCommand('UPPER')">UPPER</button>
    <button onclick="addCommand('GUARD')">GUARD</button>
    <button onclick="resetSlots()">リセット</button>
    <button onclick="runBattle()" style="background: #e74c3c; color: white; padding: 10px 20px;">対戦開始！</button>

    <div id="log"></div>

    <script>
        let myHands = [];
        const slotsDiv = document.getElementById('slots');
        const logDiv = document.getElementById('log');

        function addCommand(cmd) { if(myHands.length < 5) { myHands.push(cmd); updateUI(); } }
        function resetSlots() { myHands = []; updateUI(); }
        function updateUI() { slotsDiv.innerHTML = myHands.map(h => `<div class="slot">${h}</div>`).join(''); }

        function runBattle() {
            const enemyHands = Array.from({length: 5}, () => ['PUNCH', 'UPPER', 'GUARD'][Math.floor(Math.random()*3)]);
            let myHP = 100, enHP = 100;
            let isAir = false, airComboCount = 0;
            let enemyStunned = false;

            logDiv.innerHTML = `<b>自分: ${myHands.join(' -> ')}</b><br><b>相手: ${enemyHands.join(' -> ')}</b><hr>`;
            
            for (let i = 0; i < 5; i++) {
                let m = myHands[i] || 'IDLE';
                let e = enemyHands[i];
                let dmg = 0;
                let msg = `[${i+1}手目] `;

                // 確定反撃（ピヨり）判定
                if (enemyStunned) {
                    dmg = 15; // 確定ヒットダメージ
                    msg += `<span class="damage">相手はピヨっている！追撃で${dmg}ダメ！</span>`;
                    enHP -= dmg;
                } 
                // 相性判定
                else if (m === 'GUARD' && e === 'UPPER') {
                    msg += "ガード成功！相手の隙を突いた(カウンター発生)";
                    enemyStunned = true;
                } else if (m === 'UPPER' && e === 'GUARD') {
                    msg += "ガード崩し成功！";
                    enemyStunned = true;
                } else if (m === 'PUNCH' && e === 'UPPER') {
                    msg += "コンボ中断！(痛い...)";
                    isAir = false; airComboCount = 0;
                    myHP -= 10; // 中断された側へのペナルティ
                } else if (m === 'GUARD' && e === 'PUNCH') {
                    dmg = 2;
                    msg += `ガードしたが削られた... <span class="damage">${dmg}ダメ</span>`;
                    myHP -= dmg;
                } else if (m === e) {
                    msg += "相殺！";
                } else {
                    // 通常攻撃処理
                    if (m === 'UPPER') { isAir = true; dmg = 5; }
                    else if (m === 'PUNCH') {
                        if (isAir) {
                            airComboCount++;
                            if (airComboCount === 3) { dmg = 50; msg += "空中METEOR発動！！"; isAir = false; }
                            else { dmg = 10; msg += `空中PUNCH(${airComboCount})`; }
                        } else {
                            dmg = 10; msg += "PUNCHヒット";
                        }
                    }
                    enHP -= dmg;
                    if(dmg > 0) msg += ` → 相手に<span class="damage">${dmg}ダメ</span>`;
                }
                
                logDiv.innerHTML += msg + `<br>`;
            }
            logDiv.innerHTML += `<hr><b>結果: 自分HP ${myHP} / 相手HP ${enHP}</b>`;
        }
    </script>
</body>
</html>
