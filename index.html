<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: sans-serif; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>

<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const actionImgs = {
    idle: [new Image(), new Image()],
    punch: new Image(), punch2: new Image(),
    upper: new Image(), upper2: new Image(),
    knock: new Image(), knock2: new Image(), guard: new Image(), dash: new Image()
};
actionImgs.idle[0].src = 'player.PNG'; actionImgs.idle[1].src = 'player2.PNG';
actionImgs.punch.src = 'punch.PNG'; actionImgs.punch2.src = 'punch2.PNG';
actionImgs.upper.src = 'upper.PNG'; actionImgs.upper2.src = 'upper2.PNG';
actionImgs.knock.src = 'knock.PNG'; actionImgs.knock2.src = 'knock2.PNG';
actionImgs.guard.src = 'guard.PNG'; actionImgs.dash.src = 'dash.PNG';

let currentState = 'idle', tempVisualState = null, idleFrame = 0, xOffset = 0, yOffset = 0;
let shake = 0, isAirborne = false, yVelocity = 0, guardKnockback = 0, guardShake = 0;
let isKnocking = false, isLanding = false, isDashing = false;
let actionTimeout = null;

setInterval(() => { idleFrame = (idleFrame + 1) % 2; }, 500);

function playAction(type) {
    if (isLanding || isKnocking) return;

    if (type === 'punch') {
        if (isAirborne) yVelocity = 0; 
        isDashing = false; // コンボ開始でダッシュ状態を解除
        
        let prevState = currentState;
        tempVisualState = 'dash';
        setTimeout(() => { if (tempVisualState === 'dash') tempVisualState = null; }, 80);
        
        currentState = (prevState === 'punch') ? 'punch2' : 'punch';
        shake = 5;
        clearTimeout(actionTimeout);
        actionTimeout = setTimeout(() => { currentState = 'idle'; }, 400);
    } else if (type === 'upper') {
        // 【修正】空中またはダッシュ中はアッパー不可
        if (isAirborne || isDashing) return;
        currentState = 'upper'; yVelocity = -24; isAirborne = true;
    } else if (type === 'knock' && isAirborne) {
        currentState = 'knock'; 
        isKnocking = true; 
        yVelocity = 0; 
        setTimeout(() => { if(isKnocking) yVelocity = 35; }, 400);
    } else if (type === 'guard') {
        // 【修正】空中またはアッパー中はガード不可
        if (isAirborne || currentState === 'upper' || currentState === 'upper2') return;
        currentState = 'guard'; guardKnockback = -18; guardShake = 35;
        setTimeout(() => { if (currentState === 'guard') currentState = 'idle'; }, 300);
    }
}

function pushDash() {
    if (isAirborne || isLanding || isDashing) return;
    isDashing = true;
    currentState = 'dash'; 
    xOffset = 180; 
    setTimeout(() => { isDashing = false; }, 300);
}

function gameLoop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 【修正】ダッシュ終了後、ゆるやかに元の場所に戻る（減衰）
    if (!isDashing && xOffset > 0) {
        xOffset -= 8; // 戻るスピードを調整
        if (xOffset < 0) xOffset = 0;
    }
    
    if (isAirborne) {
        if (!(isKnocking && yVelocity === 0)) {
            let gravity = (currentState === 'punch' || currentState === 'punch2') ? 0.08 : 1.6;
            yVelocity += gravity;
        }
        yOffset += yVelocity; 
        if (currentState === 'upper' && yVelocity >= 0) currentState = 'upper2';

        if (yOffset >= 0) { 
            yOffset = 0; yVelocity = 0; 
            if (isKnocking) {
                isKnocking = false; isLanding = true;
                currentState = 'knock2'; shake = 35; 
                setTimeout(() => { isAirborne = false; isLanding = false; currentState = 'idle'; }, 1000);
            } else {
                isAirborne = false; currentState = 'idle';
            }
        }
    }
    
    let drawState = isLanding ? 'knock2' : (tempVisualState || currentState);
    let currentImg = (drawState === 'idle') ? actionImgs.idle[idleFrame] : actionImgs[drawState];
    
    if (shake > 0) shake *= 0.8;
    if (guardShake > 0) guardShake *= 0.8;
    if (guardKnockback < 0) guardKnockback += 0.8;
    
    ctx.drawImage(currentImg, 250 - 120 + xOffset + (Math.random() - 0.5) * (shake + guardShake) + guardKnockback, 270 - 120 + yOffset, 240, 240);
    ctx.save(); ctx.translate(700, 270); ctx.scale(-1, 1);
    ctx.drawImage(actionImgs.idle[0], -120, -120, 240, 240); ctx.restore();
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
