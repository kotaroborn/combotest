<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>【憲法二十六条：全文保持】マスター管理コード</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { margin: 0; height: 100%; }
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        #gameHeader {
            height: 60px;
            padding-top: env(safe-area-inset-top, 0px); /* 第26条: 時計回避余白 */
            background: #111; display: flex; justify-content: space-between; align-items: center;
            padding-left: 10px; padding-right: 10px; border-bottom: 2px solid #555;
        }
        .hp-wrap { width: 35%; height: 20px; position: relative; }
        .hp-bar-bg { position:absolute; inset:0; background:#400; border: 2px solid #fff; }
        .hp-yellow { position:absolute; top:0; left:0; height:100%; background:#dd0; transition: width 0.6s linear; }
        .hp-red { position:absolute; top:0; left:0; height:100%; background:#f00; transition: width 0.05s linear; }
        #turnDisplay { text-align:center; font-weight:900; line-height:1.1; }
        #gameArea { flex: 1; position: relative; background: #222; min-height: 0; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display:block; }
        #enemySlots { position:absolute; top:6px; left:50%; transform:translateX(-50%); display:flex; gap:4px; }
        #enemySlots .slot { width:28px; height:28px; font-size:12px; }
        #ui {
            background: #111; padding: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); /* 第26条: メニュー回避余白 */
            display: flex; flex-direction: column; gap: 10px;
        }
        #slots { display: flex; justify-content: center; gap: 5px; height: 50px; }
        .slot { width: 50px; height: 50px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; background:#222; }
        .controls { display: flex; gap: 5px; }
        .atk-group { display:flex; gap:5px; flex:2; } /* 第26条: 左に攻撃ボタン */
        .fn-group { display:flex; gap:5px; flex:1; }  /* 第26条: 右に機能ボタン */
        button { flex: 1; background: #444; border: none; color: #fff; font-weight: bold; border-radius: 5px; padding: 12px 0; cursor: pointer; }
        button:disabled { opacity: 0.4; }
        #goBtn { background:#800; }
    </style>
</head>
<body>
<script>
/** 
 * 【憲法二十六条：全文】
 * 1. 5枠設計: 画面下部に5つのスロットを固定表示。順次コマンドを埋める仕様。
 * 2. 敵コマンド可視化: バトル前に敵の5枠を生成し、上段スロットに可視化する。
 * 3. 3すくみ: [P>U][U>G][G>P] の判定ロジック。
 * 4. 空中コンボ: [Upper命中]＋[次コマンドPunch]で発動。完走まで敵行動を無視する。
 * 5. 着地同期: アッパー打ち上げ後は、両者地面(y=200)着地を確認してから次へ遷移する。
 * 6. 単発アッパー着地時: 攻撃側は必ず「dash.PNG」へ遷移させる（移動の余韻として）。
 * 7. 画像状態管理: ダメージ被弾・攻撃・待機時は必ず idle(player/player2の呼吸)に復帰。dash.PNGの貼り付きを根絶。
 * 8. ダメージ計算: P(10), U(5), M(50)基準。被弾時は必ず shake=100 を付与。
 * 9. 座標復帰: Finally句にて全キャラのy=200へのリセットを保証する。dashで戻る演出を必須とする。
 * 10. 描画品質: imageSmoothingEnabled=false を維持しドット絵品質を担保。
 * 11. モバイル対応: Flexboxとviewport固定によるレスポンシブ最適化。
 * 12. 描画資産の不変性: 外部ファイルを厳格に読み込み、存在しない場合は読み込みエラーを即座に特定する。
 * 13. オブジェクトの生存維持: 状態管理オブジェクト(s, e, imgs)は決して再定義・初期化せず、常に参照し続ける。
 * 14. 憲法完全表記: コード提示の際、本憲法リストを一切省略せず必ず全条文を記述する。
 * 15. UI永続性: HP・TURN表示は画面上部に固定し、スロットは下部に永続表示する。
 * 16. 位置保持: 攻防後は必ず定位置（中心から等距離のホームポジション）へ dash.PNG で戻り、次の攻防に備える。
 * 17. 体力ゲージ演出: ダメージ発生時、現在値が即座に減り、黄色いバーが0.6秒遅れて減少する。
 * 18. TURN表示仕様: 画面上部中央に「TURN」と「数字」を2行で太字(900)表示する。
 * 19. 敵反転描画: 敵画像は常に左右反転して表示する。
 * 20. 敵の主体性: バトル開始時、敵も同様に前進・アクションを実行する。
 * 21. パンチコンボ演出: 連続したパンチ入力時、punchとpunch2を交互に実行し、合間にdashを挟んで滑らかに接続する。
 * 22. 厳格命名規則: 全アセットの拡張子は常に「.PNG」（大文字）で統一する。ファイル名部は小文字。
 * 23. 動作保証: 画像読み込み完了を待ってからゲームループを開始し、UIインタラクションを確定させる。
 * 24. 対面踏み込みの原則: 全ての技は、必ず敵味方双方が画面中央へ dash.PNG で踏み込んでから技を繰り出し、衝突演出を行う。
 * 25. 厳格不可逆の原則: いかなる理由があろうとも、憲法の簡略化、および条文の意図的な省略・解釈の矮小化を禁止する。すべてを等しく実装すること。
 * 26. アーケード配置原則: UIは上部に時計回避余白を、下部にメニュー回避余白を確保し、左に攻撃、右に機能ボタンを配置する。
 */
</script>
<div id="gameHeader">
    <div class="hp-wrap">
        <div class="hp-bar-bg"></div>
        <div class="hp-yellow" id="hpP_y" style="width:100%"></div>
        <div class="hp-red" id="hpP" style="width:100%"></div>
    </div>
    <div id="turnDisplay">TURN<br>0</div>
    <div class="hp-wrap">
        <div class="hp-bar-bg"></div>
        <div class="hp-yellow" id="hpE_y" style="width:100%"></div>
        <div class="hp-red" id="hpE" style="width:100%"></div>
    </div>
</div>
<div id="gameArea">
    <canvas id="cvs" width="960" height="400"></canvas>
    <div id="enemySlots"></div>
</div>
<div id="ui">
    <div id="slots"></div>
    <div class="controls">
        <div class="atk-group">
            <button onclick="addHand('PUNCH')" id="btnP">PUNCH</button>
            <button onclick="addHand('UPPER')" id="btnU">UPPER</button>
            <button onclick="addHand('GUARD')" id="btnG">GUARD</button>
        </div>
        <div class="fn-group">
            <button onclick="resolveTurn()" id="goBtn">GO!</button>
            <button onclick="resetHands()" id="clrBtn">CLR</button>
        </div>
    </div>
</div>
<script>
// 第22条: ファイル名は小文字、拡張子は常に大文字 .PNG
const DB = {
    ASSETS: ['player.PNG', 'player2.PNG', 'upper.PNG', 'damage.PNG', 'knock2.PNG', 'dash.PNG', 'punch.PNG', 'punch2.PNG', 'guard.PNG'],
    POS: {
        GROUND_Y: 200, FLOAT_Y: 50, P_JUMP: 133,
        CENTER_X: 480,      // 戦う位置は常に画面中心
        HOME_HALF: 280,     // 中心からホームポジションまでの距離（両者同一）
        ATTACK_HALF: 45     // 中心から攻防時の接触位置までの距離（両者同一）
    },
    IMG_SIZE: 150,
    DMG: { P: 10, U: 5, M: 50 }, // M: 予約定数（第25条により保持。UI未実装の特殊技用）
    HITSHAKE: 100,
    BREATH_MS: 500 // player.PNG / player2.PNG の呼吸切替間隔
};
// ホームポジション・攻防位置は中心から等距離になるよう自動算出
DB.POS.P_HOME_X = DB.POS.CENTER_X - DB.POS.HOME_HALF - DB.IMG_SIZE / 2;
DB.POS.E_HOME_X = DB.POS.CENTER_X + DB.POS.HOME_HALF - DB.IMG_SIZE / 2;
DB.POS.P_ATTACK_X = DB.POS.CENTER_X - DB.POS.ATTACK_HALF - DB.IMG_SIZE / 2;
DB.POS.E_ATTACK_X = DB.POS.CENTER_X + DB.POS.ATTACK_HALF - DB.IMG_SIZE / 2;

// 第13条: この state オブジェクトは以後、再定義・再初期化しない。常にプロパティを書き換えて参照し続ける。
let state = {
    pY: DB.POS.GROUND_Y, eY: DB.POS.GROUND_Y,
    pX: DB.POS.P_HOME_X, eX: DB.POS.E_HOME_X,
    hpP: 100, hpE: 100,
    turn: 0,
    hands: [], enemyHands: [],
    pAct: 'IDLE', eAct: 'IDLE', // 'IDLE' は player.PNG / player2.PNG の呼吸表現を意味するマーカー
    shake: 0,
    lastPlayerAtk: null,
    resolving: false
};

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
ctx.imageSmoothingEnabled = false; // 第10条

const imgs = {}; // 第13条: 再初期化しない
let loadedCount = 0;
let loadFailed = [];

document.querySelectorAll('.controls button').forEach(b => b.disabled = true);

function checkAllSettled() {
    if (loadedCount + loadFailed.length === DB.ASSETS.length) {
        if (loadFailed.length > 0) {
            console.error('第12条違反: 以下のアセットが読み込めませんでした →', loadFailed.join(', '));
        }
        boot();
    }
}
DB.ASSETS.forEach(n => {
    const i = new Image();
    i.onload = () => { imgs[n] = i; loadedCount++; checkAllSettled(); };
    i.onerror = () => { loadFailed.push(n); checkAllSettled(); };
    i.src = n;
});

function boot() {
    // 第23条: 全画像の読み込み確定を待ってからループ開始・UI有効化
    document.querySelectorAll('.controls button').forEach(b => b.disabled = false);
    draw();
    startBattle();
}

// 第7条: idleマーカーの時は player.PNG / player2.PNG を時間で交互に呼吸させる
function breathSprite(t) {
    return (Math.floor(t / DB.BREATH_MS) % 2 === 0) ? 'player.PNG' : 'player2.PNG';
}
function spriteFor(act, t) {
    return act === 'IDLE' ? breathSprite(t) : act;
}

function draw(t) {
    t = t || performance.now();
    ctx.clearRect(0, 0, 960, 400);
    const shakeX = state.shake > 0 ? (Math.random() * 8 - 4) : 0;
    const shakeY = state.shake > 0 ? (Math.random() * 8 - 4) : 0;
    if (state.shake > 0) state.shake -= 16;

    ctx.save();
    ctx.translate(shakeX, shakeY);

    const pImg = imgs[spriteFor(state.pAct, t)];
    if (pImg) ctx.drawImage(pImg, state.pX, state.pY, DB.IMG_SIZE, DB.IMG_SIZE);
    else { ctx.fillStyle = '#0f0'; ctx.fillRect(state.pX, state.pY, DB.IMG_SIZE, DB.IMG_SIZE); }

    const eImg = imgs[spriteFor(state.eAct, t)];
    if (eImg) {
        ctx.save(); ctx.scale(-1, 1); // 第19条: 敵は常に反転
        ctx.drawImage(eImg, -state.eX - DB.IMG_SIZE, state.eY, DB.IMG_SIZE, DB.IMG_SIZE);
        ctx.restore();
    } else { ctx.fillStyle = '#f00'; ctx.fillRect(state.eX, state.eY, DB.IMG_SIZE, DB.IMG_SIZE); }

    ctx.restore();
    requestAnimationFrame(draw);
}

function addHand(a) { if (state.hands.length < 5 && !state.resolving) { state.hands.push(a); updateUI(); } }
function resetHands() { if (!state.resolving) { state.hands = []; updateUI(); } }
function updateUI() {
    const s = document.getElementById('slots'); s.innerHTML = '';
    state.hands.forEach(h => { const d = document.createElement('div'); d.className = 'slot'; d.innerText = h[0]; s.appendChild(d); });
}

function randomEnemyHands() {
    const opts = ['PUNCH', 'UPPER', 'GUARD'];
    const arr = [];
    for (let i = 0; i < 5; i++) arr.push(opts[Math.floor(Math.random() * opts.length)]);
    return arr;
}
function drawEnemySlots() {
    const s = document.getElementById('enemySlots'); s.innerHTML = '';
    state.enemyHands.forEach(h => { const d = document.createElement('div'); d.className = 'slot'; d.innerText = h[0]; s.appendChild(d); });
}
function startBattle() {
    // 第2条: 敵コマンド可視化 / 第20条: 敵の主体性
    state.enemyHands = randomEnemyHands();
    drawEnemySlots();
}

// 第3条: 3すくみ判定 P>U, U>G, G>P
function judge(p, e) {
    if (p === e) return 'draw';
    const beats = { PUNCH: 'UPPER', UPPER: 'GUARD', GUARD: 'PUNCH' };
    return beats[p] === e ? 'win' : 'lose';
}

function applyDamage(target, amount) {
    if (target === 'E') {
        state.hpE = Math.max(0, state.hpE - amount);
        document.getElementById('hpE').style.width = state.hpE + '%';
        setTimeout(() => { document.getElementById('hpE_y').style.width = state.hpE + '%'; }, 0); // 第17条
    } else {
        state.hpP = Math.max(0, state.hpP - amount);
        document.getElementById('hpP').style.width = state.hpP + '%';
        setTimeout(() => { document.getElementById('hpP_y').style.width = state.hpP + '%'; }, 0);
    }
    state.shake = DB.HITSHAKE; // 第8条
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function dashToCenter() {
    // 第24条: 敵味方が共に中央へ dash.PNG で踏み込む
    state.pAct = 'dash.PNG'; state.pX = DB.POS.P_ATTACK_X;
    state.eAct = 'dash.PNG'; state.eX = DB.POS.E_ATTACK_X;
    await wait(300);
}
async function dashToHome() {
    // 第16条: 攻防後は必ず中心から等距離のホームポジションへ dash.PNG で戻る
    state.pAct = 'dash.PNG'; state.pX = DB.POS.P_HOME_X;
    state.eAct = 'dash.PNG'; state.eX = DB.POS.E_HOME_X;
    await wait(300);
}
async function waitBothLanded() {
    // 第5条: 着地同期
    state.pY = DB.POS.GROUND_Y;
    state.eY = DB.POS.GROUND_Y;
    await wait(50);
}
function toIdle() {
    // 第7条: 待機時は必ず呼吸(idle)へ復帰
    state.pAct = 'IDLE';
    state.eAct = 'IDLE';
}

async function resolveTurn() {
    if (state.resolving || state.hands.length === 0) return;
    state.resolving = true;
    document.querySelectorAll('.controls button').forEach(b => b.disabled = true);

    state.turn++;
    document.getElementById('turnDisplay').innerHTML = `TURN<br>${state.turn}`;

    let isAirCombo = false;

    try {
        for (let i = 0; i < state.hands.length; i++) {
            if (state.hpE <= 0 || state.hpP <= 0) break;

            const pAct = state.hands[i];
            const eAct = state.enemyHands[i] || randomEnemyHands()[0];

            // 第4条: 空中コンボ中は敵行動を無視し、PUNCHでコンボ継続
            if (isAirCombo && pAct === 'PUNCH') {
                // コンボ中も一度離れているので再度中央へ踏み込む
                await dashToCenter();
                // 第21条: パンチ連打は punch / punch2 を交互に
                state.lastPlayerAtk = state.lastPlayerAtk === 'punch.PNG' ? 'punch2.PNG' : 'punch.PNG';
                state.pAct = imgs[state.lastPlayerAtk] ? state.lastPlayerAtk : 'punch.PNG';
                applyDamage('E', DB.DMG.P);
                await wait(600);
                continue;
            }

            if (isAirCombo && pAct !== 'PUNCH') {
                // 空中コンボがPUNCH以外で途切れる場合は着地→ホームへ戻してから通常処理
                await waitBothLanded();
                await dashToHome();
                toIdle();
                isAirCombo = false;
            }

            // 第24条: 双方が中央へ dash.PNG で踏み込んでから技を出す
            await dashToCenter();

            if (pAct === 'UPPER') {
                state.pAct = 'upper.PNG';
                state.eAct = 'damage.PNG';
                state.pY = DB.POS.P_JUMP;
                state.eY = DB.POS.FLOAT_Y;
                applyDamage('E', DB.DMG.U);
                state.lastPlayerAtk = null;
                isAirCombo = true;
                await wait(1000);

                const nextIsPunch = state.hands[i + 1] === 'PUNCH';
                if (!nextIsPunch) {
                    // 第9条+第6条: 単発アッパーは着地同期後、必ずdash.PNGを経由してホーム＆idleへ
                    await waitBothLanded();
                    await dashToHome();
                    toIdle();
                    isAirCombo = false;
                }
                continue;
            }

            if (pAct === 'GUARD') {
                state.pAct = 'guard.PNG';
                const result = judge(pAct, eAct);
                if (result === 'lose') {
                    state.eAct = (imgs[eAct.toLowerCase() + '.PNG'] ? eAct.toLowerCase() : 'punch') + '.PNG';
                    applyDamage('P', eAct === 'UPPER' ? DB.DMG.U : DB.DMG.P);
                } else {
                    // ガード成功: 被ダメージを大幅軽減
                    applyDamage('P', Math.round(DB.DMG.P * 0.2));
                }
                await wait(600);
            } else if (pAct === 'PUNCH') {
                state.pAct = 'punch.PNG';
                state.lastPlayerAtk = 'punch.PNG';
                const result = judge(pAct, eAct);
                if (result !== 'lose') {
                    state.eAct = 'damage.PNG';
                    applyDamage('E', DB.DMG.P);
                } else {
                    state.eAct = (imgs[eAct.toLowerCase() + '.PNG'] ? eAct.toLowerCase() : 'punch') + '.PNG';
                    applyDamage('P', DB.DMG.U);
                }
                await wait(600);
            }

            state.pY = DB.POS.GROUND_Y; state.eY = DB.POS.GROUND_Y;
            await wait(200);
            // 第16条: 攻防後は必ずホームポジションへ dash.PNG で戻る
            await dashToHome();
            toIdle(); // 第7条
        }
    } finally {
        // 第9条: 必ずy座標を地面に復帰。第16条によりホームポジションへ確実に戻す。
        state.pY = DB.POS.GROUND_Y;
        state.eY = DB.POS.GROUND_Y;
        state.pX = DB.POS.P_HOME_X;
        state.eX = DB.POS.E_HOME_X;
        toIdle();
        state.hands = [];
        updateUI();
        if (state.hpE > 0 && state.hpP > 0) {
            state.enemyHands = randomEnemyHands();
            drawEnemySlots();
        }
        state.resolving = false;
        document.querySelectorAll('.controls button').forEach(b => b.disabled = false);
    }
}
</script>
</body>
</html>
