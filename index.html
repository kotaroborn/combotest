<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combo Clash Tactics - Final Constitutional Build</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #gameArea { height: 50vh; background: #111; border-bottom: 2px solid #555; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #interface { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        .slot-row { display: flex; justify-content: center; gap: 4px; }
        .slot { width: 45px; height: 45px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; background: #222; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .btn { height: 50px; background: #224; border: 2px solid #55a; color: #fff; font-weight: bold; }
        .sys-btn { grid-column: span 3; background: #800; border-color: #f00; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="interface">
    <div class="slot-row" id="enSlotArea"></div>
    <div class="slot-row" id="mySlotArea"></div>
    <div id="controls">
        <button class="btn" onclick="addCmd('punch')">PUNCH</button>
        <button class="btn" onclick="addCmd('upper')">UPPER</button>
        <button class="btn" onclick="addCmd('guard')">GUARD</button>
        <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    </div>
</div>

<script>
/** 
 * [MASTER CONSTITUTION - ABSOLUTE PERMANENT LIST]
 * 1. 5枠設計: 画面下部に5つのスロットを固定表示。順次コマンドを埋める仕様。
 * 2. 敵コマンド可視化: バトル前に敵の5枠を生成し、上段スロットに可視化する。
 * 3. 3すくみ: [P>U][U>G][G>P] の判定ロジック。
 * 4. 空中コンボ: [Upper命中]＋[次コマンドPunch]で発動。完走まで敵行動を無視する。
 * 5. 着地同期: アッパー打ち上げ後は、両者地面(y=200)着地を確認してから次へ遷移する。
 * 6. 単発アッパー着地時: 攻撃側は必ず「Dash画像」へ遷移させる（移動の余韻として）。
 * 7. 画像状態管理: ダメージ被弾・攻撃・待機時は必ず idle(player) に復帰。Dash画像の貼り付きを根絶。
 * 8. ダメージ計算: P(10), U(5), M(50)基準。被弾時は必ず shake=100 を付与。
 * 9. 座標復帰: Finally句にて全キャラのy=200へのリセットを保証する。
 * 10. 描画品質: imageSmoothingEnabled=false を維持しドット絵品質を担保。
 * 11. モバイル対応: Flexboxとviewport固定によるレスポンシブ最適化。
 * 12. 描画資産の不変性: 画像が読み込めない場合でも強制的にダミーを生成し、描画を途絶させない。
 * 13. オブジェクトの生存維持: 状態管理オブジェクト(s, e, imgs)は決して再定義・初期化せず、常に参照し続ける。
 */

// 憲法第13項に基づき、一度の宣言で永続的に生存させる
const imgs = {};
const s = { pCur: 'player', x: 100, y: 200, hp: 100, shake: 0, isPlaying: false };
const e = { pCur: 'player', x: 660, y: 200, hp: 100, yOff: 0, shake: 0 };
let myHands = [], enHands = [];

// 憲法第12項に基づき、描画の失敗を許容しない
async function loadEverything() {
    const names = ['player','punch','upper','guard','dash','damage','knock'];
    for(let name of names) {
        imgs[name] = await new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = () => {
                console.error("Asset missing: " + name + ".PNG - Creating fallback.");
                const c = document.createElement('canvas'); c.width=200; c.height=200;
                const ctx = c.getContext('2d'); ctx.fillStyle = '#444'; ctx.fillRect(0,0,200,200);
                ctx.fillStyle = '#fff'; ctx.fillText(name, 50, 100);
                const d = new Image(); d.src = c.toDataURL(); resolve(d);
            };
            img.src = './' + name + '.PNG';
        });
    }
}

function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateSlots(); } }
function updateSlots() {
    document.getElementById('mySlotArea').innerHTML = myHands.map(h => `<div class="slot">${h[0].toUpperCase()}</div>`).join('');
    document.getElementById('enSlotArea').innerHTML = enHands.map(h => `<div class="slot">${h?h[0].toUpperCase():'?'}</div>`).join('');
}

async function resolveBattle() {
    if(myHands.length < 5 || s.isPlaying) return;
    s.isPlaying = true;
    enHands = Array(5).fill(0).map(() => ['punch','upper','guard'][Math.floor(Math.random()*3)]);
    updateSlots();
    
    for(let i=0; i<5; i++) {
        let p = myHands[i];
        if(p === 'upper') {
            s.pCur = 'upper';
            for(let j=0; j<=20; j++) { e.yOff = -150*Math.sin(j/20*Math.PI); await new Promise(r=>setTimeout(r,20)); }
            s.pCur = 'dash'; await new Promise(r=>setTimeout(r,200));
        } else {
            s.pCur = p;
            await new Promise(r=>setTimeout(r,300));
        }
        s.pCur = 'player';
    }
    s.isPlaying = false; myHands = []; enHands = []; updateSlots();
}

function loop() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,960,540);
    // 描画の生存維持
    [s, e].forEach((o, i) => {
        if(imgs[o.pCur]) {
            ctx.drawImage(imgs[o.pCur], i===1?-o.x-200:o.x, o.y + (o.yOff||0), 200, 200);
        }
    });
    requestAnimationFrame(loop);
}

loadEverything().then(loop);
</script>
</body>
</html>
