<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Robust Engine</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: #222; height: 50px; }
        .hp-bar { width: 40%; height: 12px; background: #400; border: 1px solid #fff; position: relative; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.2s; }
        #turnCounter { text-align: center; font-size: 10px; font-weight: bold; }
        #gameArea { width: 100%; height: 45vh; background: #111; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; object-fit: contain; }
        .slot-container { height: 60px; display: flex; gap: 2px; justify-content: center; padding: 5px; }
        .slot { width: 40px; height: 25px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; background: #222; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        button { height: 45px; background: #224; border: 1px solid #55a; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
<div id="topUI">
    <div class="hp-bar"><div id="myHp" class="hp-fill"></div></div>
    <div id="turnCounter">TURN<br><span id="turnNum" style="font-size:16px">01</span></div>
    <div class="hp-bar"><div id="enHp" class="hp-fill"></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div class="slot-container" id="mySlotArea"></div>
<div id="controls">
    <button onclick="addCmd('punch')">PUNCH</button>
    <button onclick="addCmd('upper')">UPPER</button>
    <button onclick="addCmd('guard')">GUARD</button>
    <button style="grid-column: span 3; background: #800;" onclick="executeQueue()">GO BATTLE</button>
</div>

<script>
const ctx = document.getElementById('gameCanvas').getContext('2d');
const s = { x: 100, y: 200, p: 'player', hp: 100 };
const e = { x: 660, y: 200, p: 'player', hp: 100 };
const imgs = {}; let cmdQueue = [], isRunning = false, turn = 1;

// 安全なアニメーション実行用
async function playAction(func) { return await func(); }

async function move(char, tx, ty, dur) {
    const sx = char.x, sy = char.y;
    const start = Date.now();
    while(Date.now() - start < dur) {
        let p = (Date.now() - start) / dur;
        char.x = sx + (tx - sx) * p;
        char.y = sy + (ty - sy) * p;
        await new Promise(r => setTimeout(r, 16));
    }
    char.x = tx; char.y = ty;
}

// 堅牢なメインエンジン
async function executeQueue() {
    if(isRunning || cmdQueue.length === 0) return;
    isRunning = true;

    for(let cmd of cmdQueue) {
        // 1. 前進
        await move(s, 300, 200, 200);
        
        // 2. アクション実行
        if(cmd === 'upper') {
            s.p = 'upper'; e.p = 'damage';
            for(let i=0; i<10; i++) { e.y = 200 - (100 * Math.sin(i/10 * Math.PI)); await new Promise(r=>setTimeout(r,30)); }
            e.y = 200;
        } else {
            s.p = 'punch'; e.p = 'damage';
            await new Promise(r=>setTimeout(r, 300));
        }

        // 3. 復帰（堅牢性：必ず元の位置に戻る）
        s.p = 'player'; e.p = 'player';
        await move(s, 100, 200, 200);
    }
    
    turn++; cmdQueue = []; isRunning = false;
    document.getElementById('turnNum').innerText = String(turn).padStart(2, '0');
    document.getElementById('mySlotArea').innerHTML = '';
}

function loop() {
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,960,540);
    [s, e].forEach((o, i) => {
        if(imgs[o.p]) {
            ctx.save();
            if(i===1) ctx.scale(-1, 1);
            ctx.drawImage(imgs[o.p], i===1 ? -o.x - 250 : o.x, o.y, 250, 250);
            ctx.restore();
        }
    });
    requestAnimationFrame(loop);
}

function addCmd(c) { cmdQueue.push(c); document.getElementById('mySlotArea').innerHTML += `<div class="slot">${c.toUpperCase()}</div>`; }
// 画像ロード等...
(async()=>{ 
    const names = ['player','punch','upper','damage'];
    await Promise.all(names.map(n => new Promise(r => { const i=new Image(); i.src=n+'.PNG'; i.onload=()=>{imgs[n]=i;r();}})));
    loop();
})();
</script>
</body>
</html>
