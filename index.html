<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics - Duel</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* HPゲージエリア */
        .battle-ui { display: flex; width: 100%; max-width: 800px; align-items: center; justify-content: center; margin-bottom: 30px; }
        .hp-wrapper { flex: 1; height: 40px; position: relative; background: #444; border: 4px solid #fff; }
        .hp-bar { height: 100%; background: #e74c3c; transition: width 0.3s ease; }
        .hp-ghost { position: absolute; top: 0; height: 100%; background: #f1c40f; transition: width 0.8s ease; z-index: -1; }
        
        /* 左右反転用 */
        #myBar { float: right; }
        #myGhost { right: 0; }
        #enBar { float: left; }
        #enGhost { left: 0; }

        /* 中央のターン数 */
        .center-turn { width: 80px; text-align: center; font-weight: bold; font-size: 1.5em; margin: 0 10px; }
        
        .slots-row { margin: 10px 0; display: flex; gap: 5px; }
        .slot { width: 50px; height: 50px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; background: #333; }
        #log { width: 100%; max-width: 800px; background: #000; padding: 15px; height: 200px; overflow-y: auto; border: 1px solid #555; }
    </style>
</head>
<body>

    <div class="battle-ui">
        <div class="hp-wrapper"><div id="myGhost" class="hp-ghost"></div><div id="myHP" class="hp-bar" style="width:100%"></div></div>
        <div class="center-turn" id="turnDisplay">T1</div>
        <div class="hp-wrapper"><div id="enGhost" class="hp-ghost"></div><div id="enHP" class="hp-bar" style="width:100%"></div></div>
    </div>

    <div>自分の予約:</div>
    <div id="mySlots" class="slots-row"></div>
    <div>相手の公開:</div>
    <div id="enSlots" class="slots-row"></div>

    <div style="margin: 20px 0;">
        <button onclick="addCommand('PUNCH')">PUNCH</button>
        <button onclick="addCommand('UPPER')">UPPER</button>
        <button onclick="addCommand('GUARD')">GUARD</button>
        <button onclick="resetSlots()">RESET</button>
        <button onclick="resolveBattle()" style="background:#e74c3c; color:white; padding:10px 30px;">決定</button>
    </div>

    <div id="log"></div>

    <script>
        let myHands = [], myHP = 100, enHP = 100, turn = 1;
        
        function addCommand(cmd) { if(myHands.length < 5) { myHands.push(cmd); updateUI(); } }
        function resetSlots() { myHands = []; updateUI(); }
        function updateUI() { document.getElementById('mySlots').innerHTML = myHands.map(h => `<div class="slot">${h}</div>`).join(''); }

        function updateHP() {
            document.getElementById('myHP').style.width = myHP + "%";
            document.getElementById('enHP').style.width = enHP + "%";
            // 残像演出
            setTimeout(() => {
                document.getElementById('myGhost').style.width = myHP + "%";
                document.getElementById('enGhost').style.width = enHP + "%";
            }, 300);
            document.getElementById('turnDisplay').innerText = "T" + turn;
        }

        function resolveBattle() {
            if(myHands.length < 5) return;
            const enemyHands = Array.from({length: 5}, () => ['PUNCH', 'UPPER', 'GUARD'][Math.floor(Math.random()*3)]);
            document.getElementById('enSlots').innerHTML = enemyHands.map(h => `<div class="slot">${h}</div>`).join('');
            
            let isAir = false, airCount = 0, groundCount = 0, stun = false;
            let log = document.getElementById('log');
            log.innerHTML += `--- Turn ${turn} ---<br>`;

            for(let i=0; i<5; i++) {
                let m = myHands[i], e = enemyHands[i];
                if(isAir) {
                    if(m === 'PUNCH') { airCount++; enHP -= (airCount==3?50:10); if(airCount==3) isAir=false; }
                    else isAir = false;
                } else if(stun) { enHP -= 20; stun = false; }
                else if(m=='GUARD' && e=='UPPER') stun = true;
                else if(m=='UPPER' && e=='GUARD') stun = true;
                else if(m=='PUNCH' && e!='UPPER') { groundCount++; enHP -= (10+(groundCount-1)*2); }
                else if(m=='UPPER' && e!='GUARD') isAir = true;
                
                log.innerHTML += `[${i+1}] You:${m} vs En:${e}<br>`;
            }
            turn++;
            updateHP();
            if(myHP <= 0 || enHP <= 0) alert(myHP<=0 ? "YOU LOSE" : "YOU WIN");
        }
    </script>
</body>
</html>
