<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; }
        #gameArea { width: 100vw; height: 50vh; background: #111; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        #controls { width: 100vw; display: flex; gap: 5px; padding: 5px; }
        .btn { flex: 1; height: 15vw; background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="gameArea">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="controls">
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="resetGame()" style="background:#555;">RESET</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { cur: 'player', x: 300, y: 200, vy: 0, isAir: false };
const imgs = {};
['player','player2','punch','upper','knock','guard','dash'].forEach(f => {
    imgs[f] = new Image(); imgs[f].src = f + '.PNG';
});

function playAction(type) {
    if(type === 'upper') {
        s.isAir = true; s.vy = -20; s.cur = 'upper';
    } else if(type === 'punch') {
        s.cur = 'punch';
    }
}

function resetGame() {
    s.y = 200; s.vy = 0; s.isAir = false; s.cur = 'player';
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理演算
    if (s.isAir) {
        s.vy += 1.5; s.y += s.vy;
        if(s.y >= 200) { s.y = 200; s.isAir = false; s.cur = 'player'; }
    }
    
    // キャラ描画
    if(imgs[s.cur]?.complete) ctx.drawImage(imgs[s.cur], s.x, s.y, 240, 240);
    
    // 敵描画
    ctx.save(); ctx.scale(-1, 1);
    if(imgs['player2']?.complete) ctx.drawImage(imgs['player2'], -750, 200, 240, 240);
    ctx.restore();
    
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
