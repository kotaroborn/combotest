<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Full Engine</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #gameArea { width: 100vw; height: 50vh; background: #111; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .hp { width: 30vw; height: 15px; border: 2px solid #fff; background: #400; }
        .bar { height: 100%; background: #f00; transition: width 0.3s; width: 100%; }
        #slotArea { display: flex; gap: 5px; margin: 10px; height: 40px; }
        .slot { width: 15vw; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        #controls { width: 100vw; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .btn { height: 15vw; background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="gameArea">
    <div class="ui">
        <div class="hp"><div id="myBar" class="bar"></div></div>
        <div class="hp"><div id="enBar" class="bar"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="slotArea"></div>
<div id="controls">
    <div class="btn" onclick="addCmd('punch')">PUNCH</div>
    <div class="btn" onclick="addCmd('upper')">UPPER</div>
    <div class="btn" onclick="addCmd('guard')">GUARD</div>
    <div class="btn" onclick="resetCmd()">RESET</div>
    <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { 
    pCur: 'player', x: 200, y: 200, vy: 0, isAir: false, 
    enHP: 100, isPlaying: false, shake: 0, afterImages: [] 
};
let myHands = [];

const imgNames = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'];
const imgs = {};
imgNames.forEach(f => { imgs[f] = new Image(); imgs[f].src = f + '.PNG'; });

function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateSlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; updateSlots(); } }
function updateSlots() { document.getElementById('slotArea').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join(''); }

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;

    for (let i = 0; i < myHands.length; i++) {
        let cmd = myHands[i];
        if (cmd === 'punch') {
            s.pCur = (i % 2 === 0) ? 'punch' : 'punch2';
            s.shake = 20;
            s.enHP -= 10;
        } else if (cmd === 'upper') {
            s.isAir = true; s.vy = -20; s.pCur = 'upper';
            s.afterImages.push({x: s.x, y: s.y, alpha: 0.8});
        } else {
            s.pCur = 'guard'; s.shake = 10;
        }
        document.getElementById('enBar').style.width = Math.max(0, s.enHP) + "%";
        await new Promise(r => setTimeout(r, 500));
        s.pCur = 'player';
    }
    s.isPlaying = false;
    resetCmd();
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理演算
    if (s.isAir) {
        s.vy += 1.5; s.y += s.vy;
        if(s.y >= 200) { s.y = 200; s.isAir = false; s.pCur = 'player'; }
    }
    
    // 残像描画
    s.afterImages.forEach((img, i) => {
        ctx.globalAlpha = img.alpha;
        ctx.drawImage(imgs.dash, img.x, img.y, 240, 240);
        img.alpha -= 0.1; if(img.alpha <= 0) s.afterImages.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;

    // 振動
    let off = (Math.random()-0.5) * s.shake;
    if(imgs[s.pCur]) ctx.drawImage(imgs[s.pCur], s.x + off, s.y, 240, 240);
    
    // 敵
    ctx.save(); ctx.scale(-1, 1);
    if(imgs.player2) ctx.drawImage(imgs.player2, -750, 200, 240, 240);
    ctx.restore();
    
    s.shake *= 0.8;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
