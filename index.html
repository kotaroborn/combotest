<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Finalized</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; touch-action: manipulation; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #222; height: 40px; }
        .hp-container { width: 40%; }
        .hp-bar { height: 12px; background: #400; border: 1px solid #fff; }
        .hp-fill { height: 100%; background: #f00; width: 100%; transition: width 0.3s; }
        #turnCounter { font-weight: bold; color: #ff0; font-size: 18px; }
        #gameArea { width: 100%; height: 40vh; background: #111; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        #slotArea { display: flex; gap: 5px; padding: 10px; height: 50px; justify-content: center; }
        .slot { width: 60px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #222; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .btn { height: 60px; background: #224; border: 2px solid #55a; color: white; font-weight: bold; border-radius: 8px; }
        .sys-btn { grid-column: span 3; background: #b00; height: 50px; }
    </style>
</head>
<body>

<div id="topUI">
    <div class="hp-container"><div class="hp-bar"><div id="myHp" class="hp-fill"></div></div></div>
    <div id="turnCounter">TURN: 1</div>
    <div class="hp-container"><div class="hp-bar"><div id="enHp" class="hp-fill"></div></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="slotArea"></div>
<div id="controls">
    <button class="btn" onclick="addCmd('punch')">PUNCH</button>
    <button class="btn" onclick="addCmd('upper')">UPPER</button>
    <button class="btn" onclick="addCmd('guard')">GUARD</button>
    <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    <button class="btn sys-btn" style="background:#555;" onclick="resetCmd()">RESET</button>
</div>

<script>
const DMG = { PUNCH: 10, UPPER: 5, METEOR: 50 };
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let turn = 1;
const s = { pCur: 'player', x: 100, y: 200, shake: 0, hp: 100, isPlaying: false };
const e = { pCur: 'player', x: 660, y: 200, shake: 0, hp: 100 };
const imgs = {}; ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash','damage'].forEach(f => { imgs[f] = new Image(); imgs[f].src = f + '.PNG'; });

let myHands = [];
function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateSlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; updateSlots(); } }
function updateSlots() { document.getElementById('slotArea').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join(''); }
function updateHp() { 
    document.getElementById('myHp').style.width = s.hp + '%';
    document.getElementById('enHp').style.width = e.hp + '%';
}
function applyDmg(target, val) { target.hp = Math.max(0, target.hp - val); target.shake = 50; updateHp(); }
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animateVersus(pX, eX, duration, pPose, ePose) {
    const sX = s.x, eX_s = e.x, start = Date.now();
    while(Date.now() - start < duration) {
        let pr = (Date.now() - start) / duration;
        s.x = sX + (pX - sX) * pr; e.x = eX_s + (eX - eX_s) * pr;
        s.pCur = pPose; e.pCur = ePose; await sleep(16);
    }
}

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;
    s.y = 200; e.y = 200;
    s.lastPunch = 'punch2';
    
    await animateVersus(300, 460, 300, 'dash', 'dash');

    let airCombo = false, airStep = 0;
    for (let i = 0; i < myHands.length; i++) {
        let p = myHands[i];
        
        if (airCombo) {
            airStep++;
            s.y = 50; e.y = 50;
            await animateVersus(300, 460, 100, 'dash', 'dash');

            if (p === 'punch' && airStep <= 3) {
                if (airStep === 3) {
                    s.pCur = 'knock'; e.pCur = 'damage'; await sleep(300);
                    s.y = 200; e.y = 200;
                    s.pCur = 'knock2'; applyDmg(e, DMG.METEOR); await sleep(600);
                    airCombo = false;
                } else {
                    s.pCur = (s.lastPunch === 'punch') ? 'punch2' : 'punch';
                    s.lastPunch = s.pCur;
                    applyDmg(e, DMG.UPPER); await sleep(300);
                }
            } else {
                s.y = 200; e.y = 200;
                airCombo = false;
            }
            continue;
        }

        await animateVersus(300, 460, 100, 'dash', 'dash');
        if (p === 'upper') {
            s.pCur = 'upper'; e.pCur = 'damage'; applyDmg(e, DMG.UPPER);
            await sleep(300); e.y = 50; 
            if (myHands[i+1] === 'punch') {
                s.pCur = 'upper2'; s.y = 50; airCombo = true; airStep = 0; await sleep(500);
            } else {
                await sleep(300); e.y = 200; e.pCur = 'knock2'; await sleep(500);
            }
        } else if (p === 'guard') {
            s.pCur = 'guard'; s.shake = 20; await sleep(400);
        } else if (p === 'punch') {
            s.pCur = (s.lastPunch === 'punch') ? 'punch2' : 'punch';
            s.lastPunch = s.pCur;
            applyDmg(e, DMG.PUNCH); await sleep(300);
        }
    }

    await animateVersus(100, 660, 300, 'dash', 'dash');
    s.pCur = 'player'; e.pCur = 'player';
    s.y = 200; e.y = 200;
    turn++;
    document.getElementById('turnCounter').innerText = `TURN: ${turn}`;
    s.isPlaying = false;
    resetCmd();
}

function loop() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    [s, e].forEach((obj, idx) => {
        ctx.save();
        if(idx === 1) { ctx.scale(-1, 1); ctx.drawImage(imgs[obj.pCur], -obj.x - 250, obj.y + (Math.random()-0.5)*obj.shake, 250, 250); }
        else { ctx.drawImage(imgs[obj.pCur], obj.x, obj.y + (Math.random()-0.5)*obj.shake, 250, 250); }
        ctx.restore();
        obj.shake *= 0.85;
    });
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
