<!-- [SECTION: UI/INTERFACE] 憲法第1, 2, 11項遵守 -->
<div id="interface" style="display:flex; flex-direction:column; padding:20px; gap:10px;">
    <div id="enSlotArea" style="display:flex; justify-content:center; gap:5px; color:#f00;"></div>
    <div id="mySlotArea" style="display:flex; justify-content:center; gap:5px; color:#0f0;"></div>
    <div id="controls" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
        <button onclick="addCmd('punch')">PUNCH</button>
        <button onclick="addCmd('upper')">UPPER</button>
        <button onclick="addCmd('guard')">GUARD</button>
        <button style="grid-column:span 3;" onclick="resolveBattle()">START BATTLE</button>
    </div>
</div>

<script>
/** 
 * [MASTER CONSTITUTION - ABSOLUTE PERMANENT LIST]
 * 1. 5枠設計: 画面下部に5つのスロットを固定表示。順次コマンドを埋める仕様。
 * 2. 敵コマンド可視化: バトル前に敵の5枠を生成し、上段スロットに可視化する。
 * 3. 3すくみ: [P>U][U>G][G>P] の判定ロジック。
 * 4. 空中コンボ: [Upper命中]＋[次コマンドPunch]で発動。完走まで敵行動を無視する。
 * 5. 着地同期: アッパー打ち上げ後は、両者地面(y=200)着地を確認してから次へ遷移する。
 * 6. 単発アッパー着地時: 攻撃側は必ず「Dash画像」へ遷移させる（移動の余韻として）。
 * 7. 画像状態管理: ダメージ被弾・攻撃・待機時は必ず idle(player) に復帰。Dash画像の貼り付きを根絶。
 * 8. ダメージ計算: P(10), U(5), M(50)基準。被弾時は必ず shake=100 を付与。
 * 9. 座標復帰: Finally句にて全キャラのy=200へのリセットを保証する。
 * 10. 描画: imageSmoothingEnabled=false を維持しドット絵品質を担保。
 * 11. モバイル対応: Flexboxとviewport固定によるレスポンシブ最適化。
 */

// [SECTION: BATTLE LOGIC]
let enHands = [];

function resolveBattle() {
    if(myHands.length < 5 || s.isPlaying) return;
    s.isPlaying = true;
    
    // 敵コマンド生成（憲法第2項）
    enHands = Array(5).fill(0).map(() => ['punch','upper','guard'][Math.floor(Math.random()*3)]);
    updateSlots();

    (async () => {
        for(let i=0; i<5; i++) {
            const p = myHands[i];
            const eA = enHands[i];
            
            // 3すくみ判定（憲法第3項）
            const win = (p==='punch'&&eA==='upper') || (p==='upper'&&eA==='guard') || (p==='guard'&&eA==='punch');
            
            // 実行アニメーション
            if(p === 'upper') {
                s.pCur = 'upper';
                // 打ち上げと着地（憲法第4,5,6項）
                await performAction('upper', win);
            } else {
                s.pCur = p;
                await new Promise(r=>setTimeout(r, 400));
            }
            s.pCur = 'player';
        }
        myHands = [];
        enHands = [];
        updateSlots();
        s.isPlaying = false;
    })();
}

function updateSlots() {
    document.getElementById('mySlotArea').innerHTML = myHands.map(h => `<span>${h[0].toUpperCase()}</span>`).join('');
    document.getElementById('enSlotArea').innerHTML = enHands.map(h => `<span>${h[0].toUpperCase()}</span>`).join('');
}
</script>
