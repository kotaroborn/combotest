<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: sans-serif; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>

<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==========================================================================
// 【画像ファイル名設定エリア】
// ==========================================================================
const IMG_PLAYER  = 'player.PNG';  
const IMG_PLAYER2 = 'player2.PNG'; 
const IMG_PUNCH   = 'punch.PNG';   
const IMG_PUNCH2  = 'punch2.PNG';  
const IMG_UPPER   = 'upper.PNG';   
const IMG_UPPER2  = 'upper2.PNG';  
const IMG_KNOCK   = 'knock.PNG';   
const IMG_GUARD   = 'guard.PNG';   
const IMG_DASH    = 'dash.PNG';    
// ==========================================================================

const loadImg = (src) => { 
    const i = new Image(); 
    i.src = src; 
    return i; 
};

const actionImgs = {
    idle: [loadImg(IMG_PLAYER), loadImg(IMG_PLAYER2)],
    punch: loadImg(IMG_PUNCH),
    punch2: loadImg(IMG_PUNCH2),
    upper: loadImg(IMG_UPPER),
    upper2: loadImg(IMG_UPPER2),
    knock: loadImg(IMG_KNOCK),
    guard: loadImg(IMG_GUARD),
    dash: loadImg(IMG_DASH)
};

// 状態管理変数
let currentState = 'idle';
let idleFrame = 0;
let yOffset = 0, xOffset = 0, shake = 0, isAirborne = false, meteorDrop = 0;
let actionTimeout = null;

// 物理演算用パラメータ
const gravity = 1.6;          
let yVelocity = 0;            
const jumpStartSpeed = -24;   

// コンボ・空中制限用の変数
let lastPunchWasTwo = false; 
let airPunchesLeft = 0;      

// 待機アニメーション（0.5秒おき）
setInterval(() => {
    idleFrame = (idleFrame + 1) % 2;
}, 500);

function playAction(type) {
    // 【安全装置】メテオ発動中（タメ・急降下・着地硬直含む）は、一切のボタン入力を完全に無視する
    if (currentState === 'knock') return;

    // 【空中制限】空中（アッパー落下中）はパンチとメテオ以外の入力を無視
    if (isAirborne) {
        if (type !== 'punch' && type !== 'knock') return;
    }

    if (actionTimeout) clearTimeout(actionTimeout);

    if (type === 'punch') {
        // 空中パンチの回数制限（最大2回）
        if (isAirborne) {
            if (airPunchesLeft <= 0) return;
            airPunchesLeft--;
        }

        // パンチコンボ交互切り替え
        if (currentState === 'punch') {
            currentState = 'punch2';
        } else if (currentState === 'punch2') {
            currentState = 'punch';
        } else {
            currentState = lastPunchWasTwo ? 'punch' : 'punch2';
            lastPunchWasTwo = !lastPunchWasTwo;
        }

        shake = 5;

        // パンチが終了したら元の姿勢に戻る
        actionTimeout = setTimeout(() => { 
            if (currentState === 'punch' || currentState === 'punch2') {
                if (isAirborne) {
                    currentState = (yVelocity >= 0) ? 'upper2' : 'upper';
                } else {
                    currentState = 'idle';
                }
            }
        }, 200);

    } else if (type === 'upper') {
        currentState = 'upper';
        yVelocity = jumpStartSpeed; 
        isAirborne = true;
        airPunchesLeft = 2; 

    } else if (type === 'knock' && isAirborne) {
        // 【メテオ演出：タメフェーズ】
        currentState = 'knock';
        isAirborne = false;  // 通常のジャンプ物理を即座にストップ
        yVelocity = 0;       
        meteorDrop = 0;      // まだ落とさない（0のままキープして空中静止）

        // 200ms（0.2秒）その場でピタッと止まった後、一気に急降下を開始
        actionTimeout = setTimeout(() => {
            if (currentState === 'knock') {
                meteorDrop = 32; // 以前の25からさらに超高速化
            }
        }, 200); 

    } else if (type === 'guard') {
        currentState = 'guard';
        xOffset = -20; 
        shake = 3;
        actionTimeout = setTimeout(() => { 
            if (currentState === 'guard') { currentState = 'idle'; xOffset = 0; } 
        }, 300);
    }
}

function pushDash() {
    if (isAirborne || currentState === 'knock') return; // 空中およびメテオ中はダッシュ不可
    
    if (actionTimeout) clearTimeout(actionTimeout);
    currentState = 'dash'; 
    xOffset = 60; 
    shake = 2;
    actionTimeout = setTimeout(() => { 
        if (currentState === 'dash') {
            currentState = 'idle'; 
            xOffset = 0; 
        }
    }, 150);
}

function gameLoop() {
    ctx.imageSmoothingEnabled = false;
    
    // 背景の描画
    ctx.fillStyle = '#0a192f'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    let currentImg = null;
    let fallbackColor = '#2ecc71'; 
    
    switch (currentState) {
        case 'idle': 
            currentImg = actionImgs.idle[idleFrame]; 
            fallbackColor = idleFrame === 0 ? '#2ecc71' : '#27ae60';
            break;
        case 'punch': 
            currentImg = actionImgs.punch; 
            fallbackColor = '#e74c3c'; 
            break;
        case 'punch2': 
            currentImg = actionImgs.punch2; 
            fallbackColor = '#e67e22'; 
            break;
        case 'upper': 
            currentImg = actionImgs.upper; 
            fallbackColor = '#f1c40f'; 
            break;
        case 'upper2': 
            currentImg = actionImgs.upper2; 
            fallbackColor = '#f39c12'; 
            break;
        case 'knock': 
            currentImg = actionImgs.knock; 
            fallbackColor = '#9b59b6'; // メテオ：紫
            break;
        case 'guard': 
            currentImg = actionImgs.guard; 
            fallbackColor = '#3498db'; 
            break;
        case 'dash': 
            currentImg = actionImgs.dash; 
            fallbackColor = '#1abc9c'; 
            break;
    }
    
    // ジャンプ・アッパーの物理演算
    if (isAirborne) {
        let currentGravity = gravity;
        
        // 【新仕様】空中パンチを打っている間だけ、重力を超軽量化＆落下速度に強烈なブレーキ
        if (currentState === 'punch' || currentState === 'punch2') {
            currentGravity = gravity * 0.15; // 重力をいつもの15%に軽減
            if (yVelocity > 0) {
                yVelocity *= 0.75; // 下への落下慣性を25%カットしてフワッとさせる
            }
        }
        
        yVelocity += currentGravity; 
        yOffset += yVelocity; 
        
        // 頂点判定（上昇から下降に切り替わった瞬間、即座に下降ポーズへ）
        if (yVelocity >= 0 && currentState === 'upper') {
            currentState = 'upper2';
        }
        
        // 着地判定
        if (yOffset >= 0) { 
            yOffset = 0; 
            yVelocity = 0;
            isAirborne = false; 
            if (currentState === 'upper' || currentState === 'upper2' || currentState === 'punch' || currentState === 'punch2') {
                currentState = 'idle'; 
            }
        }
    }
    
    // 【新仕様】メテオ発動時の強襲急降下（meteorDropが0より大きい＝タメが終わったら一気に加速）
    if (currentState === 'knock' && meteorDrop > 0) {
        yOffset += meteorDrop;
        meteorDrop += 3.5; // 急降下の加速スピードも鋭く強化
        
        if (yOffset >= 0) { 
            yOffset = 0; 
            meteorDrop = 0; 
            shake = 35; // 地面に激突した時の画面揺れを大幅に強化！
            
            // 着地後の激しい硬直
            actionTimeout = setTimeout(() => { 
                if (currentState === 'knock') currentState = 'idle'; 
            }, 300);
        }
    }
    
    // 影の描画
    if (yOffset < 0) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#000000';
        ctx.fillRect(250 - 60 + xOffset, 270 + 100, 120, 20); 
        ctx.globalAlpha = 1.0;
    }
    
    let dx = (Math.random() - 0.5) * shake;
    let dy = (Math.random() - 0.5) * shake;
    
    let px = 250 - 120 + xOffset + dx;
    let py = 270 - 120 + yOffset + dy;
    
    if (currentImg && currentImg.complete && currentImg.naturalWidth > 0) {
        ctx.drawImage(currentImg, px, py, 240, 240);
    } else {
        ctx.fillStyle = fallbackColor;
        ctx.fillRect(px, py, 240, 240);
    }
    
    // 敵キャラの表示
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(700 - 120, 270 - 120, 240, 240);
    
    if (shake > 0) {
        shake *= 0.8;
        if (shake < 0.1) shake = 0;
    }
    
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
