<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Final Stability</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px; background: #222; height: 45px; }
        .hp-container { width: 40%; }
        .hp-bar { height: 12px; background: #400; border: 1px solid #fff; position: relative; }
        .hp-delay { height: 100%; background: #ff0; width: 100%; position: absolute; top:0; left:0; transition: width 0.5s ease-out; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; position: absolute; top:0; left:0; transition: width 0.1s; }
        #turnCounter { text-align: center; font-size: 10px; font-weight: bold; }
        #gameArea { width: 100%; height: 45vh; background: #111; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; object-fit: contain; }
        .slot-container { display: flex; flex-direction: column; gap: 2px; padding: 5px; height: 60px; }
        .slot-row { display: flex; gap: 2px; justify-content: center; }
        .slot { width: 18%; max-width: 60px; height: 25px; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .my-slot { background: #222; }
        .en-slot { background: #422; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 5px; }
        .btn { height: 45px; background: #224; border: 2px solid #55a; color: white; font-weight: bold; border-radius: 4px; font-size: 13px; }
        .sys-btn { grid-column: span 3; background: #b00; height: 40px; }
    </style>
</head>
<body>
<div id="topUI">
    <div class="hp-container"><div class="hp-bar"><div id="myHpDelay" class="hp-delay"></div><div id="myHp" class="hp-fill"></div></div></div>
    <div id="turnCounter">TURN<br><span id="turnNum" style="font-size:14px">01</span></div>
    <div class="hp-container"><div class="hp-bar"><div id="enHpDelay" class="hp-delay"></div><div id="enHp" class="hp-fill"></div></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div class="slot-container">
    <div id="mySlotArea" class="slot-row"></div>
    <div id="enSlotArea" class="slot-row"></div>
</div>
<div id="controls">
    <button class="btn" onclick="addCmd('punch')">PUNCH</button>
    <button class="btn" onclick="addCmd('upper')">UPPER</button>
    <button class="btn" onclick="addCmd('guard')">GUARD</button>
    <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    <button class="btn sys-btn" style="background:#555;" onclick="resetCmd()">RESET</button>
</div>

<script>
const DMG = { PUNCH: 10, UPPER: 5, METEOR: 50 };
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const CHAR_SIZE = 250; 

let airCombo = false;
let turn = 1;
const s = { pCur: 'player', x: 100, y: 200, shake: 0, hp: 100, isPlaying: false, lastPunch: 'punch2' };
const e = { pCur: 'player', x: 660, y: 200, shake: 0, hp: 100 };
const ePatterns = ['punch', 'upper', 'guard'];
const imgs = {}; 

async function loadImages() {
    const names = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash','damage'];
    await Promise.all(names.map(f => new Promise(r => { imgs[f] = new Image(); imgs[f].src = f + '.PNG'; imgs[f].onload = r; })));
}

let myHands = [], enHands = [];
function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateMySlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; enHands = []; updateMySlots(); updateEnSlots(); } }
function updateMySlots() { document.getElementById('mySlotArea').innerHTML = myHands.map(h => `<div class="slot my-slot">${h.toUpperCase()}</div>`).join(''); }
function updateEnSlots() { document.getElementById('enSlotArea').innerHTML = enHands.map(h => `<div class="slot en-slot">${h.toUpperCase()}</div>`).join(''); }

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;
    
    // 敵の行動を先に確定・表示
    enHands = myHands.map(() => ePatterns[Math.floor(Math.random() * ePatterns.length)]);
    updateEnSlots();

    try {
        airCombo = false; let airStep = 0; let comboCount = 0;
        for (let i = 0; i < myHands.length; i++) {
            let p = myHands[i], eAction = enHands[i];
            if (!airCombo) { s.y = 200; e.y = 200; }
            await animateVersus(300, 460, 150, 'dash', 'dash');

            if (airCombo) {
                // ... (空中コンボロジックは維持)
                continue;
            }
            // ... (攻撃処理等は維持)
        }
    } catch(err) { console.error(err); } 
    finally {
        await animateVersus(100, 660, 300, 'player', 'player');
        s.y = 200; e.y = 200; s.isPlaying = false; turn++; 
        document.getElementById('turnNum').innerText = String(turn).padStart(2, '0');
        resetCmd();
    }
}

// animateVersus, applyDmg, sleep, loop 等は維持...
</script>
</body>
</html>
