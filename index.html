<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Upper Boosted</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #gameArea { width: 100vw; height: 50vh; background: #111; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .hp { width: 30vw; height: 15px; border: 2px solid #fff; background: #400; }
        .bar { height: 100%; background: #f00; transition: width 0.2s; width: 100%; }
        #slotArea { display: flex; gap: 5px; margin: 10px; height: 40px; }
        .slot { width: 15vw; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; background: #222; }
        #controls { width: 100vw; display: flex; gap: 5px; padding: 5px; box-sizing: border-box; }
        #actionBtns { flex: 3; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        #systemBtns { flex: 2; display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        .btn { height: 15vw; background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="gameArea">
    <div class="ui">
        <div class="hp" style="transform: scaleX(-1);"><div id="myBar" class="bar"></div></div>
        <div id="timer">99</div>
        <div class="hp"><div id="enBar" class="bar"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="slotArea"></div>

<div id="controls">
    <div id="actionBtns">
        <div class="btn" onclick="addCmd('punch')">PUNCH</div>
        <div class="btn" onclick="addCmd('upper')">UPPER</div>
        <div class="btn" onclick="addCmd('guard')">GUARD</div>
    </div>
    <div id="systemBtns">
        <div class="btn" onclick="resetCmd()" style="background:#555;">RESET</div>
        <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { 
    pCur: 'player', x: 200, y: 200, isAir: false, airPunchCount: 0,
    enHP: 100, isPlaying: false, shake: 0, afterImages: [], guardShift: 0 
};
let myHands = [];

const imgNames = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'];
const imgs = {};
imgNames.forEach(f => { imgs[f] = new Image(); imgs[f].src = f + '.PNG'; });

function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateSlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; updateSlots(); } }
function updateSlots() { document.getElementById('slotArea').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join(''); }
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animateMove(targetX, targetY, duration, pose, spawnTrail = false) {
    const startX = s.x; const startY = s.y; const start = Date.now();
    while(Date.now() - start < duration) {
        let p = (Date.now() - start) / duration;
        s.x = startX + (targetX - startX) * p;
        s.y = startY + (targetY - startY) * p;
        s.pCur = pose;
        if (spawnTrail) s.afterImages.push({x: s.x, y: s.y, alpha: 0.5});
        await sleep(16);
    }
    s.x = targetX; s.y = targetY;
}

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;

    for (let i = 0; i < myHands.length; i++) {
        let cmd = myHands[i];
        
        if (cmd === 'upper') {
            await animateMove(400, 200, 100, 'dash', true);
            s.pCur = 'upper'; s.shake = 30; await sleep(500); // 溜めを強化
            s.isAir = true;
            await animateMove(400, 50, 300, 'upper2', true); // 高速上昇
            await sleep(200); // 頂点で一瞬の静止
            await animateMove(400, 200, 300, 'upper2', true); // 下降
            s.pCur = 'knock2'; s.shake = 40; s.isAir = false; await sleep(300);
        } else if (cmd === 'punch') {
            await animateMove(400, 200, 150, 'dash', true);
            s.pCur = (i % 2 === 0) ? 'punch' : 'punch2';
            s.shake = 20; await sleep(400);
        } else if (cmd === 'guard') {
            await animateMove(400, 200, 150, 'dash', true);
            s.pCur = 'guard'; s.shake = 20; s.guardShift = -20;
            await sleep(400); s.guardShift = 0;
        }
        document.getElementById('enBar').style.width = Math.max(0, s.enHP -= 10) + "%";
    }

    await animateMove(200, 200, 180, 'dash', true);
    s.pCur = 'player'; s.isPlaying = false; resetCmd();
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    s.afterImages.forEach((img, i) => {
        ctx.globalAlpha = img.alpha;
        if(imgs.dash) ctx.drawImage(imgs.dash, img.x, img.y, 200, 200);
        img.alpha -= 0.07; if(img.alpha <= 0) s.afterImages.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;
    let offX = (Math.random() - 0.5) * s.shake + s.guardShift;
    let offY = (Math.random() - 0.5) * s.shake;
    if(imgs[s.pCur]) ctx.drawImage(imgs[s.pCur], s.x + offX, s.y + offY, 200, 200);
    ctx.save(); ctx.scale(-1, 1);
    if(imgs.player2) ctx.drawImage(imgs.player2, -750, 200, 200, 200);
    ctx.restore();
    s.shake *= 0.85;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
</html>
