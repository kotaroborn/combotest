<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; }
        canvas { 
            width: 600px; height: 337px; background: #111;
            /* ドット絵をぼかさない設定 */
            image-rendering: pixelated; 
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
    <!-- UIは簡略化しています -->
    <button onclick="resolveBattle()">GO</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
// アンチエイリアスを無効化
ctx.imageSmoothingEnabled = false;

const imgNames = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'];
const imgs = {};
let loadedCount = 0;

imgNames.forEach(f => {
    imgs[f] = new Image();
    imgs[f].src = f + '.PNG';
    imgs[f].onload = () => {
        loadedCount++;
        if(loadedCount === imgNames.length) loop(); // 全画像ロード後に描画開始
    };
});

let s = { cur: 'player', y: 0, vy: 0, isAir: false, hp: 100, enHP: 100 };

function resolveBattle() {
    // 動作確認用の簡易アニメーション
    s.isAir = true; s.vy = -20; s.cur = 'upper';
}

function loop() {
    ctx.fillStyle = '#0a192f'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理演算
    if (s.isAir) {
        s.vy += 1.5; s.y += s.vy;
        if(s.y >= 0) { s.y = 0; s.isAir = false; s.cur = 'player'; }
    }
    
    // 描画（画像がロードされていない場合はエラーを避ける）
    if(imgs[s.cur] && imgs[s.cur].complete) {
        ctx.drawImage(imgs[s.cur], 300, 200 + s.y, 240, 240);
    }
    
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
