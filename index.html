<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16/9; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const imgs = {};
['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'].forEach(f => {
    imgs[f] = new Image(); imgs[f].src = f + '.PNG';
});

let s = {
    cur: 'player', dashX: 0, y: 0, vy: 0,
    isAir: false, isDash: false, combo: 0,
    shake: 0, gShake: 0, mShake: 0, gShift: 0,
    stopMotion: 0, afterImages: []
};

function playAction(type) {
    if (type === 'punch') {
        s.combo = (s.combo >= 3) ? 1 : s.combo + 1;
        // ダッシュ挟み込み演出
        s.cur = 'dash';
        setTimeout(() => {
            s.cur = (s.combo === 2) ? 'punch2' : 'punch';
            s.shake = 20;
        }, 100);
        if (s.isAir) s.vy = -1; 
    }
    else if (type === 'upper' && !s.isAir) {
        s.cur = 'upper'; s.isAir = true; s.vy = -20;
    }
    else if (type === 'knock' && s.isAir) {
        s.stopMotion = 20; // 停止
    }
    else if (type === 'guard' && !s.isAir) {
        s.cur = 'guard'; s.gShake = 30; s.gShift = -30;
        setTimeout(() => { s.cur = 'player'; s.gShift = 0; s.combo = 0; }, 300);
    }
}

function pushDash() {
    if (s.isAir || s.isDash) return;
    s.isDash = true; s.cur = 'dash';
    let d = 30;
    let t = setInterval(() => {
        s.dashX += d; d *= 0.8;
        s.afterImages.push({x: s.dashX, alpha: 0.5});
        if (d < 1) { clearInterval(t); s.isDash = false; }
    }, 20);
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 残像描画
    s.afterImages.forEach((img, i) => {
        ctx.globalAlpha = img.alpha;
        ctx.drawImage(imgs.dash, 300 + img.x, 200, 240, 240);
        img.alpha -= 0.05; if(img.alpha <= 0) s.afterImages.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;

    // 物理とメテオ
    if (s.isAir && s.stopMotion === 0) {
        s.vy += 1.5;
        s.y += s.vy;
        if (s.y >= 0) { 
            s.y = 0; s.isAir = false; s.cur = 'knock2'; s.combo = 0;
            setTimeout(() => { s.cur = 'player'; s.dashX = 0; }, 500); 
        }
    } else if (s.stopMotion > 0) {
        s.stopMotion--; if(s.stopMotion === 0) { s.cur = 'knock'; s.vy = 25; }
    } else if (!s.isDash && s.combo === 0 && s.dashX > 0) {
        s.dashX *= 0.8; if(s.dashX < 1) s.dashX = 0;
    }

    // 描画
    let off = (Math.random()-0.5) * (s.shake + s.gShake);
    ctx.drawImage(imgs[s.cur] || imgs.player, 300 + s.dashX + off + s.gShift, 200 + s.y, 240, 240);
    
    // 敵（反転）
    ctx.save(); ctx.translate(700, 200); ctx.scale(-1, 1);
    ctx.drawImage(imgs.player, -120, 0, 240, 240); ctx.restore();
    
    s.shake *= 0.8; s.gShake *= 0.8;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
