<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Finalized</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: monospace; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16/9; position: relative; background: #111; }
        canvas { 
            width: 100%; height: 100%; display: block;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
        }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; color: #fff; font-size: 20px; pointer-events: none; }
        .gauge { width: 40%; height: 20px; border: 2px solid #fff; background: #400; }
        .inner { height: 100%; background: #f00; width: 100%; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea">
    <div id="ui">
        <div class="gauge"><div class="inner"></div></div>
        <div id="timer">99</div>
        <div class="gauge"><div class="inner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>
<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const imgs = {};
['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'].forEach(f => {
    imgs[f] = new Image(); imgs[f].src = f + '.PNG';
});

let s = {
    cur: 'player', dashX: 0, y: 0, vy: 0,
    isAir: false, isDash: false, combo: 0, airPunchCount: 0,
    shake: 0, gShake: 0, gShift: 0,
    stopMotion: 0, afterImages: [], isAttacking: false
};

function playAction(type) {
    if (type === 'punch') {
        s.isAttacking = true;
        if (s.isAir) {
            // 空中パンチ：4段まで滞空＋スロー
            s.airPunchCount = Math.min(s.airPunchCount + 1, 4);
            s.vy = 0; // 落下を止める
            s.cur = (s.airPunchCount % 2 === 0) ? 'punch2' : 'punch';
            s.shake = 10;
        } else {
            // 地上パンチ
            s.combo = (s.combo >= 3) ? 1 : s.combo + 1;
            s.cur = 'dash';
            setTimeout(() => { s.cur = (s.combo === 2) ? 'punch2' : 'punch'; s.shake = 20; }, 100);
        }
        clearTimeout(s.returnTimer);
        s.returnTimer = setTimeout(() => { s.isAttacking = false; s.airPunchCount = 0; }, 800);
    }
    else if (type === 'upper' && !s.isAir) {
        s.cur = 'upper'; s.isAir = true; s.vy = -20; s.airPunchCount = 0;
    }
    else if (type === 'knock' && s.isAir) {
        s.cur = 'knock';
        s.stopMotion = 20;
    }
    else if (type === 'guard' && !s.isAir && !s.isDash) {
        s.cur = 'guard'; s.gShake = 30; s.gShift = -30;
        setTimeout(() => { s.cur = 'player'; s.gShift = 0; }, 300);
    }
}

function pushDash() {
    if (s.isAir || s.isDash) return;
    s.isDash = true; s.cur = 'dash';
    let d = 30;
    let t = setInterval(() => {
        s.dashX += d; d *= 0.8;
        s.afterImages.push({x: s.dashX, alpha: 0.5});
        if (d < 1) { clearInterval(t); s.isDash = false; }
    }, 20);
}

function loop() {
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    s.afterImages.forEach((img, i) => {
        ctx.globalAlpha = img.alpha;
        ctx.drawImage(imgs.dash, 300 + img.x, 200, 240, 240);
        img.alpha -= 0.05; if(img.alpha <= 0) s.afterImages.splice(i, 1);
    });
    ctx.globalAlpha = 1.0;

    // 空中：パンチ中以外は落下
    if (s.isAir && s.stopMotion === 0 && s.airPunchCount === 0) {
        s.vy += 1.5; s.y += s.vy;
        if (s.y >= 0) { s.y = 0; s.isAir = false; s.cur = 'knock2'; setTimeout(() => s.cur = 'player', 500); }
    } else if (s.stopMotion > 0) {
        s.stopMotion--; if(s.stopMotion === 0) { s.vy = 25; }
    } else if (!s.isDash && !s.isAttacking && s.dashX > 0) {
        s.dashX *= 0.8; if(s.dashX < 1) { s.dashX = 0; s.cur = 'player'; }
    }

    let off = (Math.random()-0.5) * (s.shake + s.gShake);
    ctx.drawImage(imgs[s.cur] || imgs.player, 300 + s.dashX + off + s.gShift, 200 + s.y, 240, 240);
    
    ctx.save(); ctx.translate(700, 200); ctx.scale(-1, 1);
    ctx.drawImage(imgs.player, -120, 0, 240, 240); ctx.restore();
    
    s.shake *= 0.8; s.gShake *= 0.8;
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
