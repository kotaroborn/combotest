<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics - Finalized</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #gameArea { width: 100vw; height: 50vh; background: #111; position: relative; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .hp { width: 30vw; height: 15px; border: 2px solid #fff; background: #400; }
        .bar { height: 100%; background: #f00; transition: width 0.2s; width: 100%; }
        #slotArea { display: flex; gap: 5px; margin: 10px; height: 40px; }
        .slot { width: 15vw; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; background: #222; }
        #controls { width: 100vw; display: flex; gap: 5px; padding: 5px; box-sizing: border-box; }
        #actionBtns { flex: 3; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        #systemBtns { flex: 2; display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        .btn { height: 15vw; background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="gameArea">
    <div class="ui">
        <div class="hp"><div id="myBar" class="bar"></div></div>
        <div class="hp"><div id="enBar" class="bar"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="slotArea"></div>

<div id="controls">
    <div id="actionBtns">
        <div class="btn" onclick="addCmd('punch')">PUNCH</div>
        <div class="btn" onclick="addCmd('upper')">UPPER</div>
        <div class="btn" onclick="addCmd('guard')">GUARD</div>
    </div>
    <div id="systemBtns">
        <div class="btn" onclick="resetCmd()" style="background:#555;">RESET</div>
        <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { pCur: 'player', x: 100, y: 200, shake: 0, afterImages: [], guardShift: 0, isPlaying: false };
const e = { pCur: 'player', x: 660, y: 200, shake: 0, afterImages: [], guardShift: 0 };

let myHands = [];
const ePatterns = ['punch', 'upper', 'guard', 'guard', 'guard'];
let pIdx = 0;

const imgNames = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash','damage'];
const imgs = {};
imgNames.forEach(f => { imgs[f] = new Image(); imgs[f].src = f + '.PNG'; });

function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateSlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; pIdx = 0; updateSlots(); } }
function updateSlots() { document.getElementById('slotArea').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join(''); }
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animateVersus(pX, eX, duration, pPose, ePose, trailP = 'dash', trailE = 'dash') {
    const sX = s.x; const eX_start = e.x; const start = Date.now();
    while(Date.now() - start < duration) {
        let p = (Date.now() - start) / duration;
        s.x = sX + (pX - sX) * p;
        e.x = eX_start + (eX - eX_start) * p;
        s.pCur = pPose; e.pCur = ePose;
        s.afterImages.push({x: s.x, y: s.y, alpha: 0.5, img: trailP});
        e.afterImages.push({x: e.x, y: e.y, alpha: 0.5, img: trailE});
        await sleep(16);
    }
}

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;

    for (let i = 0; i < myHands.length; i++) {
        let p = myHands[i];
        let eCmd = ePatterns[pIdx % ePatterns.length];
        pIdx++;
        
        await animateVersus(300, 460, 150, 'dash', 'dash');

        if (p === 'punch') {
            if (eCmd === 'punch') { s.pCur = 'punch'; e.pCur = 'punch'; s.shake = 30; e.shake = 30; await sleep(300); }
            else if (eCmd === 'upper') { s.pCur = 'damage'; e.pCur = 'upper'; s.shake = 50; await sleep(400); }
            else if (eCmd === 'guard') { s.pCur = 'punch'; e.pCur = 'guard'; s.shake = 20; e.guardShift = 20; await sleep(400); e.guardShift = 0; }
        } else if (p === 'upper') {
            if (eCmd === 'punch') {
                s.pCur = 'upper'; e.pCur = 'damage';
                let startY = e.y;
                for(let t=0; t<=20; t++) { e.y = startY - (100 * Math.sin((t/20) * Math.PI)); await sleep(30); }
                e.y = startY;
            } else if (eCmd === 'upper') { s.pCur = 'upper'; e.pCur = 'upper'; await sleep(300); }
            else if (eCmd === 'guard') { s.pCur = 'damage'; e.pCur = 'guard'; s.guardShift = -20; e.guardShift = 20; await sleep(400); s.guardShift = 0; e.guardShift = 0; }
        } else if (p === 'guard') {
            if (eCmd === 'punch') { s.pCur = 'damage'; e.pCur = 'punch'; s.guardShift = -20; e.guardShift = 20; await sleep(400); s.guardShift = 0; e.guardShift = 0; }
            else if (eCmd === 'upper') { s.pCur = 'guard'; e.pCur = 'upper'; s.guardShift = 20; await sleep(400); s.guardShift = 0; }
            else if (eCmd === 'guard') { s.pCur = 'guard'; e.pCur = 'guard'; s.shake = 10; e.shake = 10; await sleep(300); }
        }

        await animateVersus(100, 660, 200, 'dash', 'dash');
    }

    s.pCur = 'player'; e.pCur = 'player';
    s.isPlaying = false;
    resetCmd();
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    [s, e].forEach((obj, idx) => {
        obj.afterImages.forEach((img, i) => {
            ctx.globalAlpha = img.alpha;
            if(imgs[img.img]) ctx.drawImage(imgs[img.img], img.x, img.y, 200, 200);
            img.alpha -= 0.07; if(img.alpha <= 0) obj.afterImages.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;
        ctx.save();
        let xOffset = (Math.random()-0.5)*obj.shake + obj.guardShift;
        let yOffset = (Math.random()-0.5)*obj.shake;
        if(idx === 1) { ctx.scale(-1, 1); ctx.drawImage(imgs[obj.pCur], -obj.x - 200 + xOffset, obj.y + yOffset, 200, 200); }
        else { ctx.drawImage(imgs[obj.pCur], obj.x + xOffset, obj.y + yOffset, 200, 200); }
        ctx.restore();
        obj.shake *= 0.85;
    });
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
