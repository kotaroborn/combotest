<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #gameArea { height: 50vh; background: #111; border-bottom: 2px solid #555; position: relative; }
        #gameHeader { position: absolute; top: 10px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        #turnContainer { display: flex; flex-direction: column; align-items: center; font-weight: 900; }
        .hp-bar-container { width: 35%; height: 25px; background: #400; border: 2px solid #fff; position: relative; }
        .hp-bar-inner { height: 100%; background: #f00; width: 100%; transition: width 0.3s; }
        .hp-bar-back { height: 100%; background: #ff0; width: 100%; position: absolute; top: 0; transition: width 0.6s ease-out; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #interface { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        .row { display: flex; justify-content: center; gap: 5px; }
        .slot { border: 2px solid #fff; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #222; font-weight:bold; }
    </style>
</head>
<body>

<div id="gameArea">
    <div id="gameHeader">
        <div class="hp-bar-container"><div class="hp-bar-back" id="pBack"></div><div class="hp-bar-inner" id="pInner"></div></div>
        <div id="turnContainer"><div>TURN</div><div id="turnVal">0</div></div>
        <div class="hp-bar-container"><div class="hp-bar-back" id="eBack"></div><div class="hp-bar-inner" id="eInner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>
<div id="interface">
    <div class="row" id="enSlotArea"></div>
    <div class="row" id="mySlotArea"></div>
    <div class="row">
        <button onclick="addCmd('punch')" style="flex:1; height:50px;">PUNCH</button>
        <button onclick="addCmd('upper')" style="flex:1; height:50px;">UPPER</button>
        <button onclick="addCmd('guard')" style="flex:1; height:50px;">GUARD</button>
        <button onclick="resolveBattle()" style="flex:1; height:50px; background:#800;">GO!</button>
    </div>
</div>

<script>
/** 
 * [MASTER CONSTITUTION - ABSOLUTE PERMANENT LIST]
 * 私たちは、本設計図のすべての条文を遵守し、ゲームの根幹を不変のものとして維持することを誓います。
 * 
 * 1. 5枠設計: 画面下部に5つのスロットを固定表示。順次コマンドを埋める仕様。
 * 2. 敵コマンド可視化: バトル前に敵の5枠を生成し、上段スロットに可視化する。
 * 3. 3すくみ: [P>U][U>G][G>P] の判定ロジック。
 * 4. 空中コンボ: [Upper命中]＋[次コマンドPunch]で発動。完走まで敵行動を無視する。
 * 5. 着地同期: アッパー打ち上げ後は、両者地面(y=200)着地を確認してから次へ遷移する。
 * 6. 単発アッパー着地時: 攻撃側は必ず「Dash画像」へ遷移させる（移動の余韻として）。
 * 7. 画像状態管理: ダメージ被弾・攻撃・待機時は必ず idle(player) に復帰。Dash画像の貼り付きを根絶。
 * 8. ダメージ計算: P(10), U(5), M(50)基準。被弾時は必ず shake=100 を付与。
 * 9. 座標復帰: Finally句にて全キャラのy=200へのリセットを保証する。
 * 10. 描画品質: imageSmoothingEnabled=false を維持しドット絵品質を担保。
 * 11. モバイル対応: Flexboxとviewport固定によるレスポンシブ最適化。
 * 12. 描画資産の不変性: 画像が読み込めない場合でも強制的にダミーを生成し、描画を途絶させない。
 * 13. オブジェクトの生存維持: 状態管理オブジェクト(s, e, imgs)は決して再定義・初期化せず、常に参照し続ける。
 * 14. 憲法完全表記: コード提示の際、本憲法リストを一切省略せず必ず全21項目を記述する。
 * 15. UI永続性: HP・TURN表示は画面上部に固定し、スロットは下部に永続表示する。
 * 16. 位置保持: ダッシュによる前進は、コンボ終了後も座標をリセットせず保持する。
 * 17. 体力ゲージ演出: ダメージ発生時、現在値が即座に減り、黄色いバーが0.6秒遅れて減少する。
 * 18. TURN表示仕様: 画面上部中央に「TURN」と「数字」を2行で太字(900)表示する。
 * 19. 敵反転描画: 敵画像は常に左右反転して表示する。
 * 20. 敵の主体性: バトル開始時、敵も同様に前進・アクションを実行する。
 * 21. パンチコンボ演出: 連続したパンチ入力時、punchとpunch2を交互に実行し、合間にdashを挟んで滑らかに接続する。
 */

const imgs = {};
const s = { pCur: 'player', x: 100, y: 200, hp: 100, yOff: 0, shake: 0, isPlaying: false };
const e = { pCur: 'player', x: 660, y: 200, hp: 100, yOff: 0, shake: 0 };
let myHands = [], enHands = [], turn = 0, lastPunch = 'punch2';

function updateHP(target, val) {
    target.hp = Math.max(0, target.hp - val);
    const id = target === s ? 'p' : 'e';
    document.getElementById(id+'Inner').style.width = target.hp + '%';
    setTimeout(() => { document.getElementById(id+'Back').style.width = target.hp + '%'; }, 600);
}

function initDisplay() {
    document.getElementById('mySlotArea').innerHTML = Array(5).fill('<div class="slot">?</div>').join('');
    document.getElementById('enSlotArea').innerHTML = Array(5).fill('<div class="slot">?</div>').join('');
}

async function initAssets() {
    const assets = ['player','punch','punch2','upper','guard','dash','damage','knock'];
    for(let n of assets) {
        const img = new Image(); img.src = './' + n + '.PNG';
        await new Promise(resolve => {
            img.onload = () => { imgs[n] = img; resolve(); };
            img.onerror = () => {
                const c = document.createElement('canvas'); c.width=200; c.height=200;
                const ctx = c.getContext('2d'); ctx.fillStyle = '#600'; ctx.fillRect(0,0,200,200);
                ctx.fillStyle = '#fff'; ctx.fillText(n, 20, 100);
                imgs[n] = new Image(); imgs[n].src = c.toDataURL();
                resolve();
            };
        });
    }
}

function addCmd(c) { 
    if(myHands.length < 5 && !s.isPlaying) { 
        myHands.push(c); 
        document.getElementById('mySlotArea').querySelectorAll('.slot')[myHands.length-1].innerText = c[0].toUpperCase();
    } 
}

async function resolveBattle() {
    if(myHands.length < 5 || s.isPlaying) return;
    s.isPlaying = true; turn++;
    document.getElementById('turnVal').innerText = turn;
    
    enHands = Array(5).fill(0).map(() => ['punch','upper','guard'][Math.floor(Math.random()*3)]);
    enHands.forEach((h, i) => document.getElementById('enSlotArea').querySelectorAll('.slot')[i].innerText = h[0].toUpperCase());

    for(let i=0; i<5; i++) {
        s.x += 60; e.x -= 60;
        if(myHands[i] === 'punch') {
            s.pCur = 'dash'; await new Promise(r=>setTimeout(r,150));
            lastPunch = (lastPunch === 'punch') ? 'punch2' : 'punch';
            s.pCur = lastPunch;
        } else {
            s.pCur = myHands[i];
        }
        e.pCur = enHands[i];
        await new Promise(r=>setTimeout(r,300));
        s.pCur = 'player'; e.pCur = 'player';
    }
    s.isPlaying = false; myHands = []; initDisplay();
}

function loop() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,960,540);
    [s, e].forEach((o, i) => {
        if(imgs[o.pCur]) {
            ctx.save();
            if(i === 1) { ctx.scale(-1, 1); ctx.drawImage(imgs[o.pCur], -o.x - 200, o.y, 200, 200); }
            else { ctx.drawImage(imgs[o.pCur], o.x, o.y, 200, 200); }
            ctx.restore();
        }
    });
    requestAnimationFrame(loop);
}

initDisplay();
initAssets().then(loop);
</script>
</body>
</html>
