<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #0a192f; color: white; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
        #gameArea { width: 600px; height: 337px; position: relative; background: #111; border: 2px solid #555; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; pointer-events: none; }
        .hp-bar { width: 200px; height: 15px; border: 2px solid #fff; background: #400; }
        .hp-inner { height: 100%; background: #f00; width: 100%; transition: width 0.3s; }
        
        #inputArea { width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-top: 5px; }
        .btn { height: 50px; background: #1a2a6c; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="gameArea">
    <div class="ui">
        <div class="hp-bar" style="transform: scaleX(-1);"><div id="myHP" class="hp-inner"></div></div>
        <div id="turnDisplay" style="font-size:20px;">T1</div>
        <div class="hp-bar"><div id="enHP" class="hp-inner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="inputArea">
    <div class="btn" onclick="addCmd('punch')">PUNCH</div>
    <div class="btn" onclick="addCmd('upper')">UPPER</div>
    <div class="btn" onclick="addCmd('guard')">GUARD</div>
    <div class="btn" onclick="resetCmd()">RESET</div>
    <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// 状態管理
let s = { pCur: 'player', eCur: 'player2', pY: 0, pVy: 0, pAir: false, hp: 100, enHP: 100, turn: 1 };
const imgs = {};
['player','player2','punch','upper','knock','guard','dash'].forEach(f => {
    imgs[f] = new Image(); imgs[f].src = f + '.PNG';
});

function addCmd(c) { console.log("予約:", c); }
function resetCmd() { console.log("リセット"); }

function resolveBattle() {
    s.pAir = true; s.pVy = -20; // デモ動作：アッパーでジャンプ
    s.enHP -= 10;
    document.getElementById('enHP').style.width = s.enHP + "%";
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 物理演算
    if (s.pAir) {
        s.pVy += 1.5; s.pY += s.pVy;
        if(s.pY >= 0) { s.pY = 0; s.pAir = false; }
    }
    
    // 描画: 自分 (左)
    if(imgs[s.pCur]?.complete) ctx.drawImage(imgs[s.pCur], 200, 200 + s.pY, 240, 240);
    else { ctx.fillStyle='white'; ctx.fillRect(200, 200+s.pY, 100, 100); } // 画像ない時用

    // 描画: 敵 (右)
    ctx.save(); ctx.scale(-1, 1);
    if(imgs[s.eCur]?.complete) ctx.drawImage(imgs[s.eCur], -750, 200, 240, 240);
    else { ctx.fillStyle='red'; ctx.fillRect(-750, 200, 100, 100); }
    ctx.restore();
    
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
