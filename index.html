<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics - Final Engine</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .slot { display: inline-block; width: 80px; padding: 10px; border: 2px solid #333; background: white; text-align: center; margin: 5px; font-weight: bold; }
        #log { margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #999; height: 400px; overflow-y: auto; font-family: monospace; }
        .damage { color: red; font-weight: bold; }
        .log-line { border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>
    <h2>コマンド予約 (5手)</h2>
    <div id="slots"></div>
    <button onclick="addCommand('PUNCH')">PUNCH</button>
    <button onclick="addCommand('UPPER')">UPPER</button>
    <button onclick="addCommand('GUARD')">GUARD</button>
    <button onclick="resetSlots()">リセット</button>
    <button onclick="runBattle()" style="background: #27ae60; color: white; padding: 10px 20px; font-weight: bold;">対戦開始！</button>

    <div id="log"></div>

    <script>
        let myHands = [];
        const slotsDiv = document.getElementById('slots');
        const logDiv = document.getElementById('log');

        function addCommand(cmd) { if(myHands.length < 5) { myHands.push(cmd); updateUI(); } }
        function resetSlots() { myHands = []; updateUI(); }
        function updateUI() { slotsDiv.innerHTML = myHands.map(h => `<div class="slot">${h}</div>`).join(''); }

        function runBattle() {
            const enemyHands = Array.from({length: 5}, () => ['PUNCH', 'UPPER', 'GUARD'][Math.floor(Math.random()*3)]);
            let myHP = 100, enHP = 100;
            let isAir = false, airComboCount = 0;
            let enemyStunned = false;

            logDiv.innerHTML = `<b>自分: ${myHands.join(' -> ')}</b><br><b>相手: ${enemyHands.join(' -> ')}</b><hr>`;
            
            for (let i = 0; i < 5; i++) {
                let m = myHands[i] || 'IDLE';
                let e = enemyHands[i];
                let msg = `[${i+1}手目] `;
                let dmg = 0;

                // 1. 【空中コンボ中】（無敵・相手無視・確定進行）
                if (isAir) {
                    if (m === 'PUNCH') {
                        airComboCount++;
                        if (airComboCount === 3) {
                            dmg = 50;
                            msg += `空中METEOR発動！！ <span class="damage">${dmg}ダメージ</span>`;
                            isAir = false; airComboCount = 0;
                        } else {
                            dmg = 10;
                            msg += `空中PUNCH(${airComboCount}) 確定ヒット <span class="damage">${dmg}ダメージ</span>`;
                        }
                    } else {
                        isAir = false; airComboCount = 0;
                        msg += "空中コンボ終了...";
                    }
                    enHP -= dmg;
                }
                // 2. 【通常・気絶中】（読み合い発生）
                else {
                    if (enemyStunned) {
                        dmg = 15;
                        msg += `<span class="damage">相手はピヨっている！追撃で${dmg}ダメージ</span>`;
                        enHP -= dmg;
                        enemyStunned = false; // 1手だけ有効
                    } else if (m === 'GUARD' && e === 'UPPER') {
                        msg += "カウンター成功！相手ピヨり状態へ";
                        enemyStunned = true;
                    } else if (m === 'UPPER' && e === 'GUARD') {
                        msg += "ガード崩し成功！";
                        enemyStunned = true;
                    } else if (m === 'PUNCH' && e === 'UPPER') {
                        msg += "コンボ中断！(相手の空中コンボ開始)";
                        myHP -= 10;
                    } else if (m === 'GUARD' && e === 'PUNCH') {
                        dmg = 2;
                        msg += `ガード削り <span class="damage">${dmg}ダメージ</span>`;
                        myHP -= dmg;
                    } else if (m === 'GUARD' && e === 'UPPER') {
                        // 上記のカウンターと重複するが、念のためGUARDでアッパーを無効化するロジック
                        msg += "ガード成功！アッパー無効";
                    } else if (m === 'UPPER' && e === 'PUNCH') {
                        msg += "UPPERヒット！(空中コンボ開始)";
                        isAir = true; dmg = 5; enHP -= dmg;
                    } else if (m === e) {
                        msg += "相殺！";
                    } else {
                        msg += "ヒット無し";
                    }
                }
                logDiv.innerHTML += `<div class="log-line">${msg}</div>`;
            }
            logDiv.innerHTML += `<hr><b>結果: 自分HP ${myHP} / 相手HP ${enHP}</b>`;
        }
    </script>
</body>
</html>
