<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #gameArea { height: 45vh; background: #111; border-bottom: 2px solid #555; position: relative; }
        #gameHeader { position: absolute; top: 40px; width: 100%; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .hp-bar-container { width: 30%; height: 20px; background: #400; border: 2px solid #fff; position: relative; }
        .hp-bar-inner { height: 100%; background: #f00; width: 100%; transition: width 0.3s; }
        .hp-bar-back { height: 100%; background: #ff0; width: 100%; position: absolute; top: 0; transition: width 0.6s ease-out; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #interface { flex-grow: 1; display: flex; flex-direction: column; padding: 20px 10px; gap: 15px; justify-content: flex-start; }
        #mySlotArea { display: flex; justify-content: center; gap: 5px; height: 50px; }
        .slot { border: 2px solid #fff; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: #222; font-weight:bold; font-size: 20px; }
        #controls { display: flex; gap: 10px; height: 120px; }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        button { font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>
<div id="gameArea">
    <div id="gameHeader">
        <div class="hp-bar-container"><div class="hp-bar-back" id="pBack"></div><div class="hp-bar-inner" id="pInner"></div></div>
        <div id="turnContainer" style="display:flex; flex-direction:column; align-items:center;"><div style="font-size:12px;">TURN</div><div id="turnVal">0</div></div>
        <div class="hp-bar-container"><div class="hp-bar-back" id="eBack"></div><div class="hp-bar-inner" id="eInner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>
<div id="interface">
    <div id="mySlotArea"></div>
    <div id="controls">
        <div class="btn-group" style="flex:2;"><button id="btnP">PUNCH</button><button id="btnU">UPPER</button><button id="btnG">GUARD</button></div>
        <div class="btn-group" style="flex:1;"><button id="btnCancel" style="background:#444;">CANCEL</button><button id="btnGo" style="background:#800;">GO!</button></div>
    </div>
</div>

<script>
/**
 * 【憲法全二十六条：全文】
 * 1. 5枠設計: 画面下部に5つのスロットを固定表示。順次コマンドを埋める仕様。
 * 2. 敵コマンド可視化: バトル前に敵の5枠を生成し、上段スロットに可視化する。
 * 3. 3すくみ: [P>U][U>G][G>P] の判定ロジック。
 * 4. 空中コンボ: [Upper命中]＋[次コマンドPunch]で発動。完走まで敵行動を無視する。
 * 5. 着地同期: アッパー打ち上げ後は、両者地面(y=200)着地を確認してから次へ遷移する。
 * 6. 単発アッパー着地時: 攻撃側は必ず「Dash画像」へ遷移させる（移動の余韻として）。
 * 7. 画像状態管理: ダメージ被弾・攻撃・待機時は必ず idle(player) に復帰。Dash画像の貼り付きを根絶。
 * 8. ダメージ計算: P(10), U(5), M(50)基準。被弾時は必ず shake=100 を付与。
 * 9. 座標復帰: Finally句にて全キャラのy=200へのリセットを保証する。Dashで戻る演出を必須とする。
 * 10. 描画品質: imageSmoothingEnabled=false を維持しドット絵品質を担保。
 * 11. モバイル対応: Flexboxとviewport固定によるレスポンシブ最適化。
 * 12. 描画資産の不変性: 外部ファイルを厳格に読み込み、存在しない場合は読み込みエラーを即座に特定する。
 * 13. オブジェクトの生存維持: 状態管理オブジェクト(s, e, imgs)は決して再定義・初期化せず、常に参照し続ける。
 * 14. 憲法完全表記: コード提示の際、本憲法リストを一切省略せず必ず全条文を記述する。
 * 15. UI永続性: HP・TURN表示は画面上部に固定し、スロットは下部に永続表示する。
 * 16. 位置保持: ダッシュによる前進は、コンボ終了後も座標をリセットせず保持する。
 * 17. 体力ゲージ演出: ダメージ発生時、現在値が即座に減り、黄色いバーが0.6秒遅れて減少する。
 * 18. TURN表示仕様: 画面上部中央に「TURN」と「数字」を2行で太字(900)表示する。
 * 19. 敵反転描画: 敵画像は常に左右反転して表示する。
 * 20. 敵の主体性: バトル開始時、敵も同様に前進・アクションを実行する。
 * 21. パンチコンボ演出: 連続したパンチ入力時、punchとpunch2を交互に実行し、合間にdashを挟んで滑らかに接続する。
 * 22. 厳格命名規則: 全アセットの拡張子は常に「.PNG」（大文字）で統一する。
 * 23. 動作保証: 画像読み込み完了を待ってからゲームループを開始し、UIインタラクションを確定させる。
 * 24. 対面踏み込みの原則: 全ての技は、必ず前方にダッシュ（接近）してから技を繰り出し、衝突演出を行う。
 * 25. 厳格不可逆の原則: いかなる理由があろうとも、憲法の簡略化、および条文の意図的な省略・解釈の矮小化を禁止する。すべてを等しく実装すること。
 * 26. アーケード配置原則: UIは上部に時計回避余白を、下部にメニュー回避余白を確保し、左に攻撃、右に機能ボタンを配置する。
 */

const state = { 
    s: { x: 50, y: 200, hp: 100, pCur: 'player', isPlaying: false },
    e: { x: 710, y: 200, hp: 100, pCur: 'player' },
    myHands: [], turn: 0
};

const P_COLLIDE_X = 280, E_COLLIDE_X = 480;

function updateSlots() {
    const slots = document.getElementById('mySlotArea').children;
    for(let i=0; i<5; i++) slots[i].innerText = state.myHands[i] ? state.myHands[i][0].toUpperCase() : '?';
}

function updateHP(target, val) {
    target.hp = Math.max(0, target.hp - val);
    const id = target === state.s ? 'p' : 'e';
    document.getElementById(id+'Inner').style.width = target.hp + '%';
    setTimeout(() => { document.getElementById(id+'Back').style.width = target.hp + '%'; }, 600);
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btnP').onclick = () => { if(state.myHands.length < 5) state.myHands.push('punch'); updateSlots(); };
    document.getElementById('btnU').onclick = () => { if(state.myHands.length < 5) state.myHands.push('upper'); updateSlots(); };
    document.getElementById('btnG').onclick = () => { if(state.myHands.length < 5) state.myHands.push('guard'); updateSlots(); };
    document.getElementById('btnCancel').onclick = () => { state.myHands = []; updateSlots(); };
    document.getElementById('btnGo').onclick = () => {
        if(state.myHands.length < 5) return;
        state.turn++;
        document.getElementById('turnVal').innerText = state.turn;
        // バトルロジックはここから展開
    };
    
    const area = document.getElementById('mySlotArea');
    for(let i=0; i<5; i++) { const d = document.createElement('div'); d.className = 'slot'; d.innerText = '?'; area.appendChild(d); }
});
</script>
</body>
</html>
