<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Sequencer</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
        #gameArea { width: 100vw; height: 50vh; background: #111; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        #slotArea { display: flex; gap: 5px; margin: 10px; }
        .slot { width: 15vw; height: 15vw; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        #controls { width: 100vw; display: flex; gap: 5px; padding: 5px; }
        .btn { flex: 1; height: 15vw; background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="gameArea">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="slotArea"></div>
<div id="controls">
    <div class="btn" onclick="addCmd('punch')">PUNCH</div>
    <div class="btn" onclick="addCmd('upper')">UPPER</div>
    <div class="btn" onclick="addCmd('guard')">GUARD</div>
    <div class="btn" onclick="resetCmd()" style="background:#555;">RESET</div>
    <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const s = { cur: 'player', x: 300, y: 200, vy: 0, isAir: false, isPlaying: false };
let myHands = [];

// 1. コマンド予約
function addCmd(c) {
    if (myHands.length < 5 && !s.isPlaying) {
        myHands.push(c);
        updateSlots();
    }
}

function updateSlots() {
    document.getElementById('slotArea').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join('');
}

function resetCmd() { myHands = []; updateSlots(); }

// 2. 予約されたアクションを順次実行
async function resolveBattle() {
    if (myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true;

    for (let cmd of myHands) {
        // 各アクションの実行（0.5秒間隔）
        if (cmd === 'upper') { s.isAir = true; s.vy = -20; s.cur = 'upper'; }
        else if (cmd === 'punch') { s.cur = 'punch'; }
        else { s.cur = 'guard'; }
        
        await new Promise(r => setTimeout(r, 500)); // シーケンスの間隔
    }
    
    s.isPlaying = false;
    resetCmd();
}

// 3. メインループ（変わらず）
function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (s.isAir) {
        s.vy += 1.5; s.y += s.vy;
        if(s.y >= 200) { s.y = 200; s.isAir = false; s.cur = 'player'; }
    }
    
    const imgs = {}; // 画像読み込み処理は適宜
    ctx.drawImage(document.getElementById(s.cur) || new Image(), s.x, s.y, 240, 240);
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
