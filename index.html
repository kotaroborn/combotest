<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Absolute Permanent Build</title>
    <!-- CSSは前回の完全版を継承 -->
</head>
<body>
    <!-- UI構造は前回の完全版を継承 -->
<script>
/** 
 * [MASTER CONSTITUTION - ABSOLUTE PERMANENT LIST]
 * 1. 5枠設計: 画面下部に5つのスロットを固定表示。順次コマンドを埋める仕様。
 * 2. 敵コマンド可視化: バトル前に敵の5枠を生成し、上段スロットに可視化する。
 * 3. 3すくみ: [P>U][U>G][G>P] の判定ロジック。
 * 4. 空中コンボ: [Upper命中]＋[次コマンドPunch]で発動。完走まで敵行動を無視する。
 * 5. 着地同期: アッパー打ち上げ後は、両者地面(y=200)着地を確認してから次へ遷移する。
 * 6. 単発アッパー着地時: 攻撃側は必ず「Dash画像」へ遷移させる（移動の余韻として）。
 * 7. 画像状態管理: ダメージ被弾・攻撃・待機時は必ず idle(player) に復帰。Dash画像の貼り付きを根絶。
 * 8. ダメージ計算: P(10), U(5), M(50)基準。被弾時は必ず shake=100 を付与。
 * 9. 座標復帰: Finally句にて全キャラのy=200へのリセットを保証する。
 * 10. 描画: imageSmoothingEnabled=false を維持しドット絵品質を担保。
 * 11. モバイル対応: Flexboxとviewport固定によるレスポンシブ最適化。
 */

const imgs = {};
const imgNames = ['player','punch','upper','guard','dash','damage','knock'];

// 画像読み込みの厳格化
async function loadImages() {
    return Promise.all(imgNames.map(name => {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => { imgs[name] = img; resolve(); };
            img.onerror = () => { 
                console.warn(name + ".png が見つかりません。ダミーを使用します。");
                imgs[name] = createDummyImg('#555'); // フォールバック
                resolve();
            };
            img.src = name + '.png'; // 拡張子を小文字に修正
        });
    }));
}

// 読み込み完了まで待機するロジック
loadImages().then(() => {
    loop();
    updateSlots();
});

// ...以下、resolveBattle等のロジックは前回の完全版をそのまま使用します
</script>
</body>
</html>
