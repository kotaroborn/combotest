<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: sans-serif; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>

<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const actionImgs = {
    idle: [new Image(), new Image()],
    punch: new Image(), punch2: new Image(),
    upper: new Image(), upper2: new Image(),
    knock: new Image(), knock2: new Image(), guard: new Image(), dash: new Image()
};
actionImgs.idle[0].src = 'player.PNG'; actionImgs.idle[1].src = 'player2.PNG';
actionImgs.punch.src = 'punch.PNG'; actionImgs.punch2.src = 'punch2.PNG';
actionImgs.upper.src = 'upper.PNG'; actionImgs.upper2.src = 'upper2.PNG';
actionImgs.knock.src = 'knock.PNG'; actionImgs.knock2.src = 'knock2.PNG';
actionImgs.guard.src = 'guard.PNG'; actionImgs.dash.src = 'dash.PNG';

let currentState = 'idle', tempVisualState = null, idleFrame = 0, xOffset = 0, yOffset = 0;
let shake = 0, meteorShakeX = 0, isAirborne = false, yVelocity = 0, guardKnockback = 0, guardShake = 0;
let isKnocking = false, isLanding = false, isDashing = false, dashVelocity = 0;
let afterImages = [];
let actionTimeout = null;

setInterval(() => { idleFrame = (idleFrame + 1) % 2; }, 500);

function resetAction() { 
    currentState = 'idle'; shake = 0; guardShake = 0; guardKnockback = 0; 
    isLanding = false; isKnocking = false; isAirborne = false;
    yOffset = 0; yVelocity = 0; tempVisualState = null;
    clearTimeout(actionTimeout);
}

function playAction(type) {
    if (isLanding) return;

    if (type === 'punch') {
        // ダッシュ中およびコンボ時にdash画像を強制表示
        tempVisualState = 'dash';
        setTimeout(() => { if (tempVisualState === 'dash') tempVisualState = null; }, 150);
        
        currentState = (currentState === 'punch') ? 'punch2' : 'punch';
        shake = 5;
        clearTimeout(actionTimeout);
        actionTimeout = setTimeout(() => { if (!isAirborne) resetAction(); }, 400);
    } else if (type === 'upper') {
        if (isAirborne || isDashing) return;
        currentState = 'upper'; yVelocity = -24; isAirborne = true;
    } else if (type === 'knock') {
        if (!isAirborne || isKnocking) return;
        currentState = 'knock'; isKnocking = true; yVelocity = 0;
        actionTimeout = setTimeout(() => { if(isKnocking) yVelocity = 35; }, 400);
    } else if (type === 'guard') {
        if (isAirborne || isDashing) return;
        currentState = 'guard'; guardKnockback = -18; guardShake = 35;
        actionTimeout = setTimeout(() => { resetAction(); }, 300);
    }
}

function pushDash() {
    if (isAirborne || isLanding || isKnocking || isDashing || xOffset > 0) return;
    isDashing = true; currentState = 'dash'; 
    dashVelocity = 30; xOffset = 0;
    actionTimeout = setTimeout(() => { 
        afterImages.push({x: xOffset, y: yOffset, alpha: 0.6}); 
        isDashing = false; 
    }, 200);
}

function gameLoop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (isDashing) {
        xOffset += dashVelocity; dashVelocity *= 0.8;
    } else if (xOffset > 0) {
        xOffset -= 5; if (xOffset < 0) xOffset = 0;
    }
    
    // 空中物理演算の修正（ジャンプ高さ制限）
    if (isAirborne) {
        // パンチコンボ中のみ重力を緩和。通常の空中状態は重力を強く保つ
        let gravity = (currentState.includes('punch')) ? 0.8 : 1.6;
        if (!(isKnocking && yVelocity === 0)) yVelocity += gravity;
        
        yOffset += yVelocity; 
        if (currentState === 'upper' && yVelocity >= 0) currentState = 'upper2';
        
        if (yOffset >= 0) { 
            yOffset = 0; yVelocity = 0; 
            if (isKnocking) {
                isKnocking = false; isLanding = true; currentState = 'knock2'; 
                actionTimeout = setTimeout(() => { resetAction(); }, 1500);
            } else { 
                isLanding = true; currentState = 'knock2';
                actionTimeout = setTimeout(() => { resetAction(); }, 150);
            }
        }
    }
    
    // 描画ステートの優先順位を明確化
    let drawState = tempVisualState || currentState;
    if (isDashing && currentState === 'idle') drawState = 'dash';
    if (isLanding) drawState = 'knock2';
    
    let currentImg = (drawState === 'idle') ? actionImgs.idle[idleFrame] : actionImgs[drawState];
    ctx.drawImage(currentImg, 250 - 120 + xOffset + guardKnockback, 270 - 120 + yOffset, 240, 240);
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
