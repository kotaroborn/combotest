<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Combo Clash Tactics - Battle Royale</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .stats { display: flex; gap: 20px; font-size: 1.2em; font-weight: bold; }
        .slot { display: inline-block; width: 60px; padding: 10px; border: 2px solid #333; background: white; text-align: center; margin: 2px; }
        #log { margin-top: 20px; padding: 15px; background: #fff; height: 300px; overflow-y: auto; font-family: monospace; }
        .turn-header { background: #333; color: white; padding: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>自分 HP: <span id="myHP">100</span></div>
        <div>相手 HP: <span id="enHP">100</span></div>
    </div>
    
    <h2>コマンド予約 (5手)</h2>
    <div id="slots"></div>
    <button onclick="addCommand('PUNCH')">PUNCH</button>
    <button onclick="addCommand('UPPER')">UPPER</button>
    <button onclick="addCommand('GUARD')">GUARD</button>
    <button onclick="resetSlots()">リセット</button>
    <button onclick="executeTurn()" id="execBtn" style="background: #27ae60; color: white; padding: 10px 20px;">ターン開始</button>

    <div id="log"></div>

    <script>
        let myHands = [], myHP = 100, enHP = 100, turn = 1;
        let isAir = false, airComboCount = 0, enemyStunned = false;

        function addCommand(cmd) { if(myHands.length < 5) { myHands.push(cmd); updateUI(); } }
        function resetSlots() { myHands = []; updateUI(); }
        function updateUI() { document.getElementById('slots').innerHTML = myHands.map(h => `<div class="slot">${h}</div>`).join(''); }

        function executeTurn() {
            if(myHands.length < 5) return alert("5手予約してください");
            const enemyHands = Array.from({length: 5}, () => ['PUNCH', 'UPPER', 'GUARD'][Math.floor(Math.random()*3)]);
            document.getElementById('log').innerHTML += `<div class="turn-header">--- 第${turn}ターン ---</div>`;
            
            for (let i = 0; i < 5; i++) {
                let m = myHands[i], e = enemyHands[i], msg = `[${i+1}] `;
                
                if (isAir) {
                    if (m === 'PUNCH') {
                        airComboCount++;
                        if (airComboCount === 3) { enHP -= 50; msg += "空中METEOR発動！50ダメ"; isAir = false; airComboCount = 0; }
                        else { enHP -= 10; msg += `空中PUNCH(${airComboCount}) 10ダメ`; }
                    } else { isAir = false; airComboCount = 0; msg += "空中コンボ終了"; }
                } else {
                    if (enemyStunned) { enHP -= 15; msg += "ピヨり追撃 15ダメ"; enemyStunned = false; }
                    else if (m === 'GUARD' && e === 'UPPER') { msg += "カウンター成功！"; enemyStunned = true; }
                    else if (m === 'UPPER' && e === 'GUARD') { msg += "ガード崩し成功！"; enemyStunned = true; }
                    else if (m === 'PUNCH' && e === 'UPPER') { myHP -= 10; msg += "コンボ中断！被ダメ10"; }
                    else if (m === 'GUARD' && e === 'PUNCH') { myHP -= 2; msg += "ガード削り 2ダメ"; }
                    else if (m === 'UPPER' && e !== 'GUARD') { isAir = true; enHP -= 5; msg += "UPPERヒット！5ダメ(空中へ)"; }
                    else if (m === 'PUNCH' && e !== 'UPPER') { enHP -= 10; msg += "PUNCHヒット 10ダメ"; }
                }
                document.getElementById('log').innerHTML += `<div>${msg}</div>`;
                if(myHP <= 0 || enHP <= 0) break;
            }
            
            document.getElementById('myHP').innerText = myHP;
            document.getElementById('enHP').innerText = enHP;
            turn++;
            resetSlots();

            if(myHP <= 0 || enHP <= 0) {
                alert(myHP <= 0 ? "敗北..." : "勝利！");
                location.reload();
            }
        }
    </script>
</body>
</html>
