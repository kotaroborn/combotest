<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: sans-serif; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>

<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const IMG_PLAYER  = 'player.PNG';  
const IMG_PLAYER2 = 'player2.PNG'; 
const IMG_PUNCH   = 'punch.PNG';   
const IMG_PUNCH2  = 'punch2.PNG';  
const IMG_UPPER   = 'upper.PNG';   
const IMG_UPPER2  = 'upper2.PNG';  
const IMG_KNOCK   = 'knock.PNG';   
const IMG_GUARD   = 'guard.PNG';   
const IMG_DASH    = 'dash.PNG';    

const loadImg = (src) => { const i = new Image(); i.src = src; return i; };
const actionImgs = {
    idle: [loadImg(IMG_PLAYER), loadImg(IMG_PLAYER2)],
    punch: loadImg(IMG_PUNCH),
    punch2: loadImg(IMG_PUNCH2),
    upper: loadImg(IMG_UPPER),
    upper2: loadImg(IMG_UPPER2),
    knock: loadImg(IMG_KNOCK),
    guard: loadImg(IMG_GUARD),
    dash: loadImg(IMG_DASH)
};

let currentState = 'idle';
let idleFrame = 0;
let yOffset = 0, xOffset = 0, shake = 0, isAirborne = false, meteorDrop = 0;
let actionTimeout = null;
let returnTimeout = null; 
let dashGhosts = [];
let guardKnockback = 0;
let guardShake = 0;

const gravity = 1.6;          
let yVelocity = 0;            
const jumpStartSpeed = -24;   
let lastPunchWasTwo = false; 

setInterval(() => { idleFrame = (idleFrame + 1) % 2; }, 500);

function addGhost(img, x, y, fallbackColor) {
    dashGhosts.push({ img, x, y, fallbackColor, alpha: 0.6 });
}

function playAction(type) {
    if (currentState === 'knock') return;
    if (isAirborne && type !== 'punch' && type !== 'knock') return;

    if (actionTimeout) clearTimeout(actionTimeout);
    if (returnTimeout) clearTimeout(returnTimeout);

    if (type !== 'guard') { guardKnockback = 0; guardShake = 0; }

    if (type === 'punch') {
        // 【新仕様】パンチ入力のたびに、まず一瞬「ダッシュ画像」を挟む
        let prevState = currentState;
        currentState = 'dash';
        
        setTimeout(() => {
            if (currentState === 'dash') {
                currentState = (prevState === 'punch') ? 'punch2' : 'punch';
            }
        }, 80); // 80msの間だけダッシュ画像を表示

        let isDashPunch = (prevState === 'dash' || xOffset > 0);
        if (isDashPunch && !isAirborne) xOffset = 140;
        shake = 5;

        actionTimeout = setTimeout(() => { 
            if (currentState === 'punch' || currentState === 'punch2') {
                if (isAirborne) currentState = (yVelocity >= 0) ? 'upper2' : 'upper';
                else {
                    currentState = 'idle';
                    if (xOffset > 0) returnTimeout = setTimeout(() => { currentState = 'idle'; }, 400);
                }
            }
        }, 280);
    } else if (type === 'upper') {
        currentState = 'upper';
        yVelocity = jumpStartSpeed; 
        isAirborne = true;
        if (xOffset > 0) xOffset = 0; 
    } else if (type === 'knock' && isAirborne) {
        currentState = 'knock';
        isAirborne = false; yVelocity = 0; meteorDrop = 0;
        if (xOffset > 0) xOffset = 0;
        actionTimeout = setTimeout(() => { if (currentState === 'knock') meteorDrop = 32; }, 200); 
    } else if (type === 'guard') {
        currentState = 'guard';
        if (xOffset > 0) xOffset = 0; 
        guardKnockback = -18; 
        guardShake = 35; 
        actionTimeout = setTimeout(() => { if (currentState === 'guard') currentState = 'idle'; }, 300);
    }
}

function pushDash() {
    if (isAirborne || currentState === 'knock') return; 
    if (actionTimeout) clearTimeout(actionTimeout);
    if (returnTimeout) clearTimeout(returnTimeout);
    currentState = 'dash'; xOffset = 100; shake = 2;
    actionTimeout = setTimeout(() => { if (currentState === 'dash') { currentState = 'idle'; returnTimeout = setTimeout(() => {}, 0); } }, 150);
}

function gameLoop() {
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (currentState !== 'dash' && currentState !== 'punch' && currentState !== 'punch2' && xOffset > 0) {
        xOffset -= 10; if (xOffset < 0) xOffset = 0;
    }
    
    if (guardKnockback < 0) {
        guardKnockback += (guardShake > 5) ? 0.2 : 0.8;
        if (guardKnockback > 0) guardKnockback = 0;
    }
    
    let currentImg = (currentState === 'idle') ? actionImgs.idle[idleFrame] : actionImgs[currentState];
    let fallbackColor = '#2ecc71';
    
    if (currentState === 'dash' || ((currentState === 'punch' || currentState === 'punch2') && xOffset > 60)) {
        if (Math.random() < 0.4) addGhost(currentImg, xOffset, yOffset, fallbackColor);
    }
    
    for (let i = dashGhosts.length - 1; i >= 0; i--) {
        let g = dashGhosts[i];
        ctx.globalAlpha = g.alpha;
        let gx = 250 - 120 + g.x; let gy = 270 - 120 + g.y;
        if (g.img?.complete) ctx.drawImage(g.img, gx, gy, 240, 240);
        else { ctx.fillStyle = g.fallbackColor; ctx.fillRect(gx, gy, 240, 240); }
        g.alpha -= 0.05; if (g.alpha <= 0) dashGhosts.splice(i, 1);
    }
    ctx.globalAlpha = 1.0; 
    
    if (isAirborne) {
        yVelocity += (currentState === 'punch' || currentState === 'punch2') ? gravity * 0.15 : gravity; 
        yOffset += yVelocity; 
        if (yVelocity >= 0 && currentState === 'upper') currentState = 'upper2';
        if (yOffset >= 0) { yOffset = 0; yVelocity = 0; isAirborne = false; currentState = 'idle'; }
    }
    
    if (currentState === 'knock' && meteorDrop > 0) {
        yOffset += meteorDrop; meteorDrop += 3.5; 
        if (yOffset >= 0) { yOffset = 0; meteorDrop = 0; shake = 35; actionTimeout = setTimeout(() => { currentState = 'idle'; }, 300); }
    }
    
    if (yOffset < 0) { ctx.globalAlpha = 0.3; ctx.fillStyle = '#000000'; ctx.fillRect(250 - 60 + xOffset, 370, 120, 20); ctx.globalAlpha = 1.0; }
    
    let dx = (Math.random() - 0.5) * (shake + guardShake);
    let dy = (Math.random() - 0.5) * (shake + guardShake);
    
    let px = 250 - 120 + xOffset + dx + guardKnockback;
    let py = 270 - 120 + yOffset + dy;
    
    if (currentImg?.complete) ctx.drawImage(currentImg, px, py, 240, 240);
    else { ctx.fillStyle = fallbackColor; ctx.fillRect(px, py, 240, 240); }
    
    let enemyImg = actionImgs.idle[0]; 
    if (enemyImg?.complete) {
        ctx.save(); ctx.translate(580 + 120, 150 + 120); ctx.scale(-1, 1); ctx.drawImage(enemyImg, -120, -120, 240, 240); ctx.restore();
    } else { ctx.fillStyle = '#ff0055'; ctx.fillRect(580, 150, 240, 240); }
    
    if (shake > 0) shake *= 0.8;
    if (guardShake > 0) guardShake *= 0.8;
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
