<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const actionImgs = {
    idle: [new Image(), new Image()],
    punch: new Image(), punch2: new Image(),
    upper: new Image(), upper2: new Image(),
    knock: new Image(), knock2: new Image(), guard: new Image(), dash: new Image()
};
['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash'].forEach((n,i) => {
    if(n === 'player') actionImgs.idle[0].src = 'player.PNG';
    else if(n === 'player2') actionImgs.idle[1].src = 'player2.PNG';
    else actionImgs[n].src = n + '.PNG';
});

let currentState = 'idle', tempVisualState = null, idleFrame = 0, xOffset = 0, yOffset = 0;
let shake = 0, guardShake = 0, meteorShakeX = 0, guardKnockback = 0;
let isAirborne = false, yVelocity = 0, isDashing = false, isLanding = false, isKnocking = false;
let actionTimeout = null;

function resetAction() { 
    currentState = 'idle'; shake = 0; guardShake = 0; guardKnockback = 0; meteorShakeX = 0;
    isLanding = false; isKnocking = false; isAirborne = false; isDashing = false;
    yOffset = 0; yVelocity = 0; xOffset = 0; tempVisualState = null;
    clearTimeout(actionTimeout);
}

function playAction(type) {
    if (isLanding) return;

    if (type === 'punch') {
        // コンボ遷移時にdash画像を一瞬挟む
        if (currentState === 'punch') {
            tempVisualState = 'dash';
            setTimeout(() => { tempVisualState = null; }, 100);
        }
        currentState = (currentState === 'punch') ? 'punch2' : 'punch';
        shake = 15; // 振動強化
        if(isDashing) { yVelocity = -2; } // ダッシュ中の浮遊感
        clearTimeout(actionTimeout);
        actionTimeout = setTimeout(() => { if (!isAirborne) resetAction(); }, 400);
    } else if (type === 'upper') {
        if (isAirborne || isDashing) return;
        currentState = 'upper'; yVelocity = -20; isAirborne = true;
    } else if (type === 'knock') {
        if (!isAirborne || isKnocking) return;
        currentState = 'knock'; isKnocking = true; yVelocity = 0;
        meteorShakeX = 80;
        actionTimeout = setTimeout(() => { if(isKnocking) yVelocity = 30; }, 400);
    } else if (type === 'guard') {
        if (isAirborne || isDashing) return;
        currentState = 'guard'; guardKnockback = -20; guardShake = 40;
        actionTimeout = setTimeout(() => { resetAction(); }, 300);
    }
}

function pushDash() {
    if (isAirborne || isLanding || isDashing) return;
    isDashing = true; currentState = 'dash';
    let dV = 30;
    let intv = setInterval(() => {
        xOffset += dV; dV *= 0.8;
        if (dV < 2) { clearInterval(intv); isDashing = false; }
    }, 20);
}

function gameLoop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (isAirborne) {
        // ダッシュ中パンチならスロー(0.08)、通常は1.6
        let gravity = (isDashing || currentState.includes('punch')) ? 0.08 : 1.6;
        if (!isKnocking) yVelocity += gravity;
        yOffset += yVelocity;
        if (yOffset >= 0) {
            yOffset = 0; yVelocity = 0;
            if (isKnocking) { isKnocking = false; isLanding = true; currentState = 'knock2'; setTimeout(resetAction, 1000); }
            else { isAirborne = false; resetAction(); }
        }
    }

    // 描画と振動反映
    let drawState = tempVisualState || (isDashing ? 'dash' : currentState);
    let img = actionImgs[drawState] || actionImgs.idle[idleFrame];
    let sX = (Math.random()-0.5) * (shake + guardShake + meteorShakeX);
    ctx.drawImage(img, 250 + xOffset + guardKnockback + sX, 270 + yOffset, 240, 240);

    // 減衰
    shake *= 0.8; guardShake *= 0.8; meteorShakeX *= 0.8;
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
