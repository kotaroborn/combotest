<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; font-family: monospace; touch-action: none; }
        #gameArea { width: 100vw; height: 50vh; position: relative; background: #111; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        
        /* UI */
        .ui { position: absolute; top: 5px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .hp-bar { width: 30vw; height: 15px; border: 2px solid #fff; background: #400; }
        .hp-inner { height: 100%; background: #f00; width: 100%; transition: width 0.3s; }
        
        /* コマンド予約表示 */
        #slots { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        .slot { width: 15vw; height: 10vw; background: #333; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        #inputArea { width: 100vw; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .btn { height: 15vw; background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<div id="gameArea">
    <div class="ui">
        <div class="hp-bar" style="transform: scaleX(-1);"><div id="myHP" class="hp-inner"></div></div>
        <div id="turnDisplay">T1</div>
        <div class="hp-bar"><div id="enHP" class="hp-inner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div id="slots"></div>
<div id="inputArea">
    <div class="btn" onclick="addCmd('punch')">PUNCH</div>
    <div class="btn" onclick="addCmd('upper')">UPPER</div>
    <div class="btn" onclick="addCmd('guard')">GUARD</div>
    <div class="btn" onclick="resetCmd()">RESET</div>
    <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let s = { cur: 'player', eCur: 'player2', pY: 0, pVy: 0, pAir: false, hp: 100, enHP: 100, turn: 1 };
let myHands = [];

function updateSlots() {
    document.getElementById('slots').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join('');
}

function addCmd(c) { if(myHands.length < 5) { myHands.push(c); updateSlots(); } }
function resetCmd() { myHands = []; updateSlots(); }

function resolveBattle() {
    if(myHands.length < 5) return alert("5手予約してください");
    
    myHands.forEach((m, i) => {
        let e = ['punch', 'upper', 'guard'][Math.floor(Math.random()*3)];
        // ロジック：アッパーで空中へ
        if(m === 'upper') { s.pAir = true; s.pVy = -20; s.cur = 'upper'; }
        // ロジック：パンチでダメージ
        if(m === 'punch') { s.enHP -= 10; s.cur = 'punch'; }
    });
    
    document.getElementById('enHP').style.width = s.enHP + "%";
    myHands = []; updateSlots();
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (s.pAir) { s.pVy += 1.5; s.pY += s.pVy; if(s.pY >= 0) { s.pY = 0; s.pAir = false; s.cur = 'player'; } }
    
    // 描画
    ctx.drawImage(document.getElementById(s.cur) || new Image(), 200, 200 + s.pY, 240, 240);
    ctx.save(); ctx.scale(-1, 1);
    ctx.drawImage(document.getElementById(s.eCur) || new Image(), -750, 200, 240, 240);
    ctx.restore();
    
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
