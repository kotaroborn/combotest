<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        #gameArea { height: 45vh; background: #111; border-bottom: 2px solid #555; position: relative; }
        #gameHeader { position: absolute; top: 10px; width: 100%; padding: 0 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #turnContainer { display: flex; flex-direction: column; align-items: center; font-weight: 900; pointer-events: none; }
        .hp-bar-container { width: 35%; height: 20px; background: #400; border: 2px solid #fff; position: relative; }
        .hp-bar-inner { height: 100%; background: #f00; width: 100%; transition: width 0.3s; }
        .hp-bar-back { height: 100%; background: #ff0; width: 100%; position: absolute; top: 0; transition: width 0.6s ease-out; }
        canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #interface { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; gap: 5px; justify-content: flex-end; }
        .row { display: flex; justify-content: center; gap: 5px; }
        .slot { border: 2px solid #fff; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: #222; font-weight:bold; font-size: 20px; }
        button { height: 60px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div id="gameArea">
    <div id="gameHeader">
        <div class="hp-bar-container"><div class="hp-bar-back" id="pBack"></div><div class="hp-bar-inner" id="pInner"></div></div>
        <div id="turnContainer"><div style="font-size:12px;">TURN</div><div id="turnVal">0</div></div>
        <div class="hp-bar-container"><div class="hp-bar-back" id="eBack"></div><div class="hp-bar-inner" id="eInner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>
<div id="interface">
    <div class="row" id="enSlotArea"></div>
    <div class="row" id="mySlotArea"></div>
    <div class="row">
        <button id="btnP" style="flex:1;">PUNCH</button> <button id="btnU" style="flex:1;">UPPER</button> <button id="btnG" style="flex:1;">GUARD</button> <button id="btnGo" style="flex:1; background:#800; color:#fff;">GO!</button>
    </div>
</div>

<script>
/** 
 * [憲法定義一覧]
 * 1.5枠設計 2.敵可視化 3.3すくみ 4.空中コンボ 5.着地同期 6.Dash余韻 7.状態管理 8.ダメージ揺れ 9.座標帰還 10.品質 11.モバイル 12.アセット 13.生存維持 14.完全表記 15.UI永続 16.位置保持 17.ゲージ演出 18.TURN太字 19.敵反転 20.敵主体性 21.パンチコンボ 22.命名規則 23.動作保証 24.対面踏み込み
 */

const imgs = {};
const s = { x: 100, y: 200, hp: 100, pCur: 'player', shake: 0, isPlaying: false, ghosts: [] };
const e = { x: 660, y: 200, hp: 100, pCur: 'player', shake: 0, ghosts: [] };
let myHands = [], enHands = [], turn = 0, lastPunch = 'punch2';

async function resolveBattle() {
    if(myHands.length < 5 || s.isPlaying) return;
    s.isPlaying = true; turn++;
    document.getElementById('turnVal').innerText = turn;
    
    // ターン開始接近(第24項)
    for(let i=0; i<10; i++) { s.x += 30; e.x -= 30; await new Promise(r=>setTimeout(r, 20)); }

    for(let i=0; i<5; i++) {
        let p = myHands[i], ea = ['punch','upper','guard'][Math.floor(Math.random()*3)];
        s.pCur = (p === 'punch' && lastPunch === 'punch') ? 'punch2' : p;
        lastPunch = s.pCur; e.pCur = ea;
        if((p==='punch'&&ea==='upper') || (p==='upper'&&ea==='guard') || (p==='guard'&&ea==='punch')) {
            e.hp -= 10; document.getElementById('eInner').style.width = e.hp + '%';
            setTimeout(() => { document.getElementById('eBack').style.width = e.hp + '%'; }, 600);
            e.shake = 100;
        }
        await new Promise(r=>setTimeout(r, 400));
        s.pCur = 'dash'; await new Promise(r=>setTimeout(r, 100)); // 第6項
        s.pCur = 'player';
    }

    // 帰還(第9項)
    s.pCur = 'dash'; e.pCur = 'dash';
    while(s.x > 100) {
        s.x -= 20; e.x += 20;
        s.ghosts.push({x:s.x, y:s.y, p:s.pCur, a:0.3});
        await new Promise(r=>setTimeout(r, 30));
    }
    s.x = 100; e.x = 660; s.pCur = 'player'; e.pCur = 'player';
    s.isPlaying = false; myHands = [];
}

function loop() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,960,540);
    [s, e].forEach(o => {
        o.ghosts.forEach((g, idx) => { ctx.globalAlpha = g.a; ctx.drawImage(imgs[g.p] || imgs.player, g.x, g.y, 200, 200); if(idx % 3 == 0) o.ghosts.splice(idx, 1); });
        ctx.globalAlpha = 1.0;
        let dx = o.x + (o.shake > 0 ? (Math.random()*20-10) : 0);
        if(o.shake > 0) o.shake -= 10;
        ctx.save();
        if(o === e) { ctx.scale(-1, 1); ctx.drawImage(imgs[o.pCur], -dx - 200, o.y, 200, 200); }
        else { ctx.drawImage(imgs[o.pCur], dx, o.y, 200, 200); }
        ctx.restore();
    });
    requestAnimationFrame(loop);
}

document.addEventListener('DOMContentLoaded', async () => {
    const assets = ['player','punch','punch2','upper','guard','dash','damage','knock'];
    await Promise.all(assets.map(n => new Promise(res => { const img = new Image(); img.onload = () => { imgs[n] = img; res(); }; img.src = './' + n + '.PNG'; })));
    document.getElementById('btnP').onclick = () => myHands.length < 5 && myHands.push('punch') && (document.getElementById('mySlotArea').children[myHands.length-1].innerText = 'P');
    document.getElementById('btnU').onclick = () => myHands.length < 5 && myHands.push('upper') && (document.getElementById('mySlotArea').children[myHands.length-1].innerText = 'U');
    document.getElementById('btnG').onclick = () => myHands.length < 5 && myHands.push('guard') && (document.getElementById('mySlotArea').children[myHands.length-1].innerText = 'G');
    document.getElementById('btnGo').onclick = resolveBattle;
    document.getElementById('mySlotArea').innerHTML = Array(5).fill('<div class="slot">?</div>').join('');
    loop();
});
</script>
</body>
</html>
