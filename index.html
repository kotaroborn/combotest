<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #0a192f; display: flex; flex-direction: column; align-items: center; overflow: hidden; font-family: sans-serif; }
        #gameArea { width: 100%; max-width: 600px; aspect-ratio: 16 / 9; position: relative; }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #inputArea { width: 100%; max-width: 600px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; background: #000; }
        .btn { height: 60px; background: #1a2a6c; color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; touch-action: manipulation; }
        .btn:active { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>

<div id="inputArea">
    <div class="btn" onclick="playAction('punch')">PUNCH</div>
    <div class="btn" onclick="playAction('upper')">UPPER</div>
    <div class="btn" onclick="pushDash()">DASH</div>
    <div class="btn" onclick="playAction('guard')">GUARD</div>
    <div class="btn" onclick="playAction('knock')">METEOR</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==========================================================================
// 【画像ファイル名設定エリア】
// ==========================================================================
const IMG_PLAYER  = 'player.PNG';  
const IMG_PLAYER2 = 'player2.PNG'; 
const IMG_PUNCH   = 'punch.PNG';   
const IMG_PUNCH2  = 'punch2.PNG';  
const IMG_UPPER   = 'upper.PNG';   
const IMG_UPPER2  = 'upper2.PNG';  
const IMG_KNOCK   = 'knock.PNG';   
const IMG_GUARD   = 'guard.PNG';   
const IMG_DASH    = 'dash.PNG';    
// ==========================================================================

const loadImg = (src) => { 
    const i = new Image(); 
    i.src = src; 
    return i; 
};

const actionImgs = {
    idle: [loadImg(IMG_PLAYER), loadImg(IMG_PLAYER2)],
    punch: loadImg(IMG_PUNCH),
    punch2: loadImg(IMG_PUNCH2),
    upper: loadImg(IMG_UPPER),
    upper2: loadImg(IMG_UPPER2),
    knock: loadImg(IMG_KNOCK),
    guard: loadImg(IMG_GUARD),
    dash: loadImg(IMG_DASH)
};

// 状態管理変数
let currentState = 'idle';
let idleFrame = 0;
let yOffset = 0, xOffset = 0, shake = 0, isAirborne = false, meteorDrop = 0;
let actionTimeout = null;
let returnTimeout = null; 

// 残像を管理する配列
let dashGhosts = [];

// 新設：ガード時の左ノックバックのピクセル値
let guardKnockback = 0;

// 物理演算用パラメータ
const gravity = 1.6;          
let yVelocity = 0;            
const jumpStartSpeed = -24;   

// コンボ用の変数
let lastPunchWasTwo = false; 

// 待機アニメーション（0.5秒おき）
setInterval(() => {
    idleFrame = (idleFrame + 1) % 2;
}, 500);

// 残像を追加する関数
function addGhost(img, x, y, fallbackColor) {
    dashGhosts.push({
        img: img,
        x: x,
        y: y,
        fallbackColor: fallbackColor,
        alpha: 0.6 
    });
}

function playAction(type) {
    if (currentState === 'knock') return;

    if (isAirborne) {
        if (type !== 'punch' && type !== 'knock') return;
    }

    if (actionTimeout) clearTimeout(actionTimeout);
    if (returnTimeout) clearTimeout(returnTimeout);

    // ガード以外ならガードノックバックはリセット
    if (type !== 'guard') guardKnockback = 0;

    if (type === 'punch') {
        // 【新仕様】空中制限を撤廃したため、回数チェックを削除（無限にパンチ可能）

        let isDashPunch = (currentState === 'dash' || xOffset > 0);

        if (currentState === 'punch') {
            currentState = 'punch2';
        } else if (currentState === 'punch2') {
            currentState = 'punch';
        } else {
            currentState = lastPunchWasTwo ? 'punch' : 'punch2';
            lastPunchWasTwo = !lastPunchWasTwo;
        }

        if (isDashPunch && !isAirborne) {
            xOffset = 140; 
        }

        shake = 5;

        actionTimeout = setTimeout(() => { 
            if (currentState === 'punch' || currentState === 'punch2') {
                if (isAirborne) {
                    currentState = (yVelocity >= 0) ? 'upper2' : 'upper';
                } else {
                    currentState = 'idle';
                    
                    if (xOffset > 0) {
                        returnTimeout = setTimeout(() => {
                            currentState = 'idle';
                        }, 400);
                    }
                }
            }
        }, 200);

    } else if (type === 'upper') {
        currentState = 'upper';
        yVelocity = jumpStartSpeed; 
        isAirborne = true;
        if (xOffset > 0) xOffset = 0; 

    } else if (type === 'knock' && isAirborne) {
        currentState = 'knock';
        isAirborne = false;  
        yVelocity = 0;       
        meteorDrop = 0;      
        if (xOffset > 0) xOffset = 0;

        actionTimeout = setTimeout(() => {
            if (currentState === 'knock') {
                meteorDrop = 32; 
            }
        }, 200); 

    } else if (type === 'guard') {
        currentState = 'guard';
        if (xOffset > 0) xOffset = 0; 
        
        // 【新仕様】ガードの瞬間に左に4pxググッと押し込まれる
        guardKnockback = -5; 
        
        actionTimeout = setTimeout(() => { 
            if (currentState === 'guard') { 
                currentState = 'idle'; 
            } 
        }, 300);
    }
}

function pushDash() {
    if (isAirborne || currentState === 'knock') return; 
    
    if (actionTimeout) clearTimeout(actionTimeout);
    if (returnTimeout) clearTimeout(returnTimeout);
    
    currentState = 'dash'; 
    xOffset = 100; 
    shake = 2;
    
    actionTimeout = setTimeout(() => { 
        if (currentState === 'dash') {
            currentState = 'idle'; 
            returnTimeout = setTimeout(() => {}, 0); 
        }
    }, 150);
}

function gameLoop() {
    ctx.imageSmoothingEnabled = false;
    
    // 背景の描画
    ctx.fillStyle = '#0a192f'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 前方維持から元の位置へ滑らかに戻る処理
    if (currentState !== 'dash' && currentState !== 'punch' && currentState !== 'punch2' && xOffset > 0) {
        xOffset -= 10; 
        if (xOffset < 0) xOffset = 0;
    }
    
    // 【新仕様】ガードノックバックを徐々に元の位置（0）へ戻す処理（硬いバネのような戻り）
    if (guardKnockback < 0) {
        guardKnockback += 0.4; 
        if (guardKnockback > 0) guardKnockback = 0;
    }
    
    let currentImg = null;
    let fallbackColor = '#2ecc71'; 
    
    switch (currentState) {
        case 'idle': 
            currentImg = actionImgs.idle[idleFrame]; 
            fallbackColor = idleFrame === 0 ? '#2ecc71' : '#27ae60';
            break;
        case 'punch': 
            currentImg = actionImgs.punch; 
            fallbackColor = '#e74c3c'; 
            break;
        case 'punch2': 
            currentImg = actionImgs.punch2; 
            fallbackColor = '#e67e22'; 
            break;
        case 'upper': 
            currentImg = actionImgs.upper; 
            fallbackColor = '#f1c40f'; 
            break;
        case 'upper2': 
            currentImg = actionImgs.upper2; 
            fallbackColor = '#f39c12'; 
            break;
        case 'knock': 
            currentImg = actionImgs.knock; 
            fallbackColor = '#9b59b6'; 
            break;
        case 'guard': 
            currentImg = actionImgs.guard; 
            fallbackColor = '#3498db'; 
            break;
        case 'dash': 
            currentImg = actionImgs.dash; 
            fallbackColor = '#1abc9c'; 
            break;
    }
    
    // ダッシュ中またはダッシュパンチ中に残像を生成
    if (currentState === 'dash' || ((currentState === 'punch' || currentState === 'punch2') && xOffset > 60)) {
        if (Math.random() < 0.4) {
            addGhost(currentImg, xOffset, yOffset, fallbackColor);
        }
    }
    
    // 残像（ゴースト）の描画
    for (let i = dashGhosts.length - 1; i >= 0; i--) {
        let g = dashGhosts[i];
        ctx.globalAlpha = g.alpha;
        
        let gx = 250 - 120 + g.x;
        let gy = 270 - 120 + g.y;
        
        if (g.img && g.img.complete && g.img.naturalWidth > 0) {
            ctx.drawImage(g.img, gx, gy, 240, 240);
        } else {
            ctx.fillStyle = g.fallbackColor;
            ctx.fillRect(gx, gy, 240, 240);
        }
        
        g.alpha -= 0.05; 
        if (g.alpha <= 0) {
            dashGhosts.splice(i, 1); 
        }
    }
    ctx.globalAlpha = 1.0; 
    
    // ジャンプ・アッパーの物理演算
    if (isAirborne) {
        let currentGravity = gravity;
        if (currentState === 'punch' || currentState === 'punch2') {
            currentGravity = gravity * 0.15; 
            if (yVelocity > 0) yVelocity *= 0.75; 
        }
        
        yVelocity += currentGravity; 
        yOffset += yVelocity; 
        
        if (yVelocity >= 0 && currentState === 'upper') {
            currentState = 'upper2';
        }
        
        if (yOffset >= 0) { 
            yOffset = 0; 
            yVelocity = 0;
            isAirborne = false; 
            if (currentState === 'upper' || currentState === 'upper2' || currentState === 'punch' || currentState === 'punch2') {
                currentState = 'idle'; 
            }
        }
    }
    
    // メテオ急降下
    if (currentState === 'knock' && meteorDrop > 0) {
        yOffset += meteorDrop;
        meteorDrop += 3.5; 
        if (yOffset >= 0) { 
            yOffset = 0; 
            meteorDrop = 0; 
            shake = 35; 
            actionTimeout = setTimeout(() => { 
                if (currentState === 'knock') currentState = 'idle'; 
            }, 300);
        }
    }
    
    // 影の描画
    if (yOffset < 0) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#000000';
        ctx.fillRect(250 - 60 + xOffset, 270 + 100, 120, 20); 
        ctx.globalAlpha = 1.0;
    }
    
    // カメラシェイク
    let dx = (Math.random() - 0.5) * shake;
    let dy = (Math.random() - 0.5) * shake;
    
    // ガードノックバック（左へのめり込み）の座標を適用
    let px = 250 - 120 + xOffset + dx + guardKnockback;
    let py = 270 - 120 + yOffset + dy;
    
    if (currentImg && currentImg.complete && currentImg.naturalWidth > 0) {
        ctx.drawImage(currentImg, px, py, 240, 240);
    } else {
        ctx.fillStyle = fallbackColor;
        ctx.fillRect(px, py, 240, 240);
    }
    
    // ==========================================================================
    // 【新仕様】敵キャラの表示（player.PNGをプログラムで左右反転）
    // ==========================================================================
    let enemyImg = actionImgs.idle[0]; // player.PNGをベースに使用
    let ex = 700 - 120;
    let ey = 270 - 120;
    
    if (enemyImg && enemyImg.complete && enemyImg.naturalWidth > 0) {
        ctx.save();
        // 敵キャラの座標中心を基準に反転マトリックスを適用
        ctx.translate(ex + 120, ey + 120);
        ctx.scale(-1, 1); // 左右反転
        ctx.drawImage(enemyImg, -120, -120, 240, 240);
        ctx.restore();
    } else {
        // 画像未読み込み時のフォールバック（赤）
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(ex, ey, 240, 240);
    }
    // ==========================================================================
    
    if (shake > 0) {
        shake *= 0.8;
        if (shake < 0.1) shake = 0;
    }
    
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
