<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics - Smooth Landing</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; touch-action: manipulation; overflow: hidden; }
        #topUI { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #222; height: 40px; }
        .hp-container { width: 40%; }
        .hp-bar { height: 12px; background: #400; border: 1px solid #fff; }
        .hp-fill { height: 100%; background: #0f0; width: 100%; transition: width 0.3s; }
        #turnCounter { font-weight: bold; color: #ff0; font-size: 18px; }
        #gameArea { width: 100%; height: 35vh; background: #111; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        #slotArea { display: flex; gap: 5px; padding: 10px; height: 50px; justify-content: center; }
        .slot { width: 60px; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #222; }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .btn { height: 70px; background: #224; border: 2px solid #55a; color: white; font-weight: bold; border-radius: 8px; font-size: 16px; touch-action: manipulation; }
        .sys-btn { grid-column: span 3; background: #b00; height: 55px; font-size: 18px; }
    </style>
</head>
<body>
<div id="topUI">
    <div class="hp-container"><div class="hp-bar"><div id="myHp" class="hp-fill"></div></div></div>
    <div id="turnCounter">TURN: 1</div>
    <div class="hp-container"><div class="hp-bar"><div id="enHp" class="hp-fill"></div></div></div>
</div>
<div id="gameArea"><canvas id="gameCanvas" width="960" height="540"></canvas></div>
<div id="slotArea"></div>
<div id="controls">
    <button class="btn" onclick="addCmd('punch')">PUNCH</button>
    <button class="btn" onclick="addCmd('upper')">UPPER</button>
    <button class="btn" onclick="addCmd('guard')">GUARD</button>
    <button class="btn sys-btn" onclick="resolveBattle()">GO BATTLE</button>
    <button class="btn sys-btn" style="background:#555;" onclick="resetCmd()">RESET</button>
</div>

<script>
const DMG = { PUNCH: 10, UPPER: 5, METEOR: 50 };
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let turn = 1;
let airCombo = false;
const s = { pCur: 'player', x: 100, y: 200, shake: 0, hp: 100, isPlaying: false, lastPunch: 'punch2' };
const e = { pCur: 'player', x: 660, y: 200, shake: 0, hp: 100 };
const ePatterns = ['punch', 'upper', 'guard'];
const imgs = {}; 

async function loadImages() {
    const names = ['player','player2','punch','punch2','upper','upper2','knock','knock2','guard','dash','damage'];
    await Promise.all(names.map(f => {
        return new Promise(resolve => {
            imgs[f] = new Image();
            imgs[f].src = f + '.PNG';
            imgs[f].onload = resolve;
        });
    }));
}

let myHands = [];
function addCmd(c) { if(myHands.length < 5 && !s.isPlaying) { myHands.push(c); updateSlots(); } }
function resetCmd() { if(!s.isPlaying) { myHands = []; updateSlots(); } }
function updateSlots() { document.getElementById('slotArea').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join(''); }
function updateHp() { document.getElementById('myHp').style.width = s.hp + '%'; document.getElementById('enHp').style.width = e.hp + '%'; }
function applyDmg(target, val) { target.hp = Math.max(0, target.hp - val); target.shake = 100; updateHp(); }
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 空中からの着地用アニメーション関数
async function landSmoothly() {
    for(let j = 20; j >= 0; j--) {
        let y = 150 * Math.sin((j / 20) * Math.PI / 2);
        e.y = 200 - y; s.y = 200 - y;
        await sleep(20);
    }
    s.y = 200; e.y = 200; s.pCur = 'dash';
}

async function animateVersus(pX, eX, duration, pPose, ePose) {
    const sX = s.x, eX_s = e.x;
    const start = Date.now();
    while(Date.now() - start < duration) {
        let pr = (Date.now() - start) / duration;
        let ease = 1 - Math.pow(1 - pr, 3);
        s.x = sX + (pX - sX) * ease;
        e.x = eX_s + (eX - eX_s) * ease;
        if (!airCombo) { s.y = Math.min(200, s.y + 10); e.y = Math.min(200, e.y + 10); }
        s.pCur = pPose; e.pCur = ePose; await sleep(16);
    }
}

async function resolveBattle() {
    if(myHands.length === 0 || s.isPlaying) return;
    s.isPlaying = true; let eIdx = 0; airCombo = false; let airStep = 0;
    let comboCount = 0; 
    
    for (let i = 0; i < myHands.length; i++) {
        let p = myHands[i];
        let eAction = ePatterns[eIdx++ % ePatterns.length];
        await animateVersus(300, 460, 150, 'dash', 'dash');

        if (airCombo) {
            airStep++;
            s.y = 50; e.y = 50;
            s.pCur = (s.lastPunch === 'punch') ? 'punch2' : 'punch';
            s.lastPunch = s.pCur;
            e.pCur = 'damage';
            s.shake = 50; 
            
            // コンボ継続判定
            if (p === 'punch' && airStep <= 3) {
                if (airStep === 3) {
                    s.pCur = 'knock'; e.pCur = 'damage'; await sleep(300);
                    airCombo = false; await landSmoothly(); // 着地演出
                    applyDmg(e, DMG.METEOR + (comboCount * 10)); await sleep(600);
                    comboCount = 0;
                } else { applyDmg(e, DMG.UPPER + (comboCount * 5)); comboCount++; await sleep(300); }
            } else { 
                airCombo = false; await landSmoothly(); // コンボ終了時の着地演出
                comboCount = 0; 
            }
            continue;
        }

        if (p === 'guard') {
            s.pCur = 'guard'; s.shake = 150; 
            e.pCur = (eAction === 'punch') ? 'punch' : (eAction === 'upper' ? 'upper' : 'player');
            if (eAction === 'punch' || eAction === 'upper') { applyDmg(s, DMG.PUNCH/2); s.pCur = 'damage'; }
            await sleep(400);
            e.pCur = 'player';
        } else {
            let playerHit = !(p === 'punch' && eAction === 'guard');
            if (playerHit) { applyDmg(e, (p === 'upper' ? DMG.UPPER : DMG.PUNCH) + (comboCount * 5)); comboCount++; }
            else { comboCount = 0; e.pCur = 'guard'; e.shake = 150; await sleep(400); }
            if (eAction === 'punch' && p === 'upper') applyDmg(s, DMG.PUNCH);
            await animateVersus(300, 460, 200, p, eAction);
        }

        if (p === 'upper' && eAction !== 'punch' && !airCombo) {
            let myJump = (myHands[i+1] === 'punch') ? 150 : 50;
            for(let j = 0; j <= 20; j++) { 
                let eY = 150 * Math.sin((j / 20) * Math.PI / 2);
                let mY = myJump * Math.sin((j / 20) * Math.PI / 2);
                e.y = 200 - eY; s.y = 200 - mY; e.pCur = 'damage'; await sleep(20); 
            }
            if (myHands[i+1] === 'punch') { airCombo = true; airStep = 0; s.y = 50; e.y = 50; }
            else { await landSmoothly(); }
        }
    }
    await animateVersus(100, 660, 300, 'player', 'player');
    s.y = 200; e.y = 200; turn++; s.isPlaying = false; resetCmd();
}

function loop() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    [s, e].forEach((obj, idx) => {
        const img = imgs[obj.pCur];
        if(img && img.complete) {
            ctx.save();
            if(idx === 1) { ctx.scale(-1, 1); ctx.drawImage(img, -obj.x - 250, obj.y + (Math.random()-0.5)*obj.shake, 250, 250); }
            else { ctx.drawImage(img, obj.x, obj.y + (Math.random()-0.5)*obj.shake, 250, 250); }
            ctx.restore();
        }
        obj.shake *= 0.85;
    });
    requestAnimationFrame(loop);
}

loadImages().then(loop);
</script>
</body>
</html>
