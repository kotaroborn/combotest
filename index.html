<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Combo Clash Tactics</title>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; flex-direction: column; align-items: center; font-family: monospace; touch-action: manipulation; }
        #gameArea { width: 100vw; height: 50vh; position: relative; background: #111; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .hp-bar { width: 35vw; height: 15px; border: 2px solid #fff; background: #400; }
        .hp-inner { height: 100%; background: #f00; width: 100%; }
        
        /* 予約・公開エリア */
        .slot-container { width: 100vw; padding: 5px; box-sizing: border-box; }
        .slot-row { display: flex; gap: 2px; justify-content: center; margin-bottom: 5px; }
        .slot { width: 18vw; height: 12vw; background: #222; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        #controls { width: 100vw; display: flex; gap: 5px; padding: 5px; box-sizing: border-box; }
        #actionBtns { flex: 3; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        #systemBtns { flex: 1; display: grid; grid-template-columns: 1fr; gap: 5px; }
        .btn { background: #1a2a6c; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; height: 15vw; }
    </style>
</head>
<body>

<div id="gameArea">
    <div class="ui">
        <div class="hp-bar" style="transform: scaleX(-1);"><div id="myHP" class="hp-inner"></div></div>
        <div id="turnDisplay">T1</div>
        <div class="hp-bar"><div id="enHP" class="hp-inner"></div></div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<div class="slot-container">
    <div id="mySlots" class="slot-row"></div>
    <div id="enSlots" class="slot-row" style="background:#100;"></div>
</div>

<div id="controls">
    <div id="actionBtns">
        <div class="btn" onclick="addCmd('punch')">PUNCH</div>
        <div class="btn" onclick="addCmd('upper')">UPPER</div>
        <div class="btn" onclick="addCmd('guard')">GUARD</div>
    </div>
    <div id="systemBtns">
        <div class="btn" onclick="resetCmd()" style="background:#555;">RESET</div>
        <div class="btn" onclick="resolveBattle()" style="background:#b00;">GO</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const imgs = {};
['player','player2','punch','upper','knock','guard','dash'].forEach(f => {
    imgs[f] = new Image(); imgs[f].src = f + '.PNG';
});

let myHands = [], enemyHands = [];
let s = { pCur: 'player', eCur: 'player2', pY: 0, pVy: 0, pAir: false };

function updateUI() {
    document.getElementById('mySlots').innerHTML = myHands.map(h => `<div class="slot">${h.toUpperCase()}</div>`).join('');
    document.getElementById('enSlots').innerHTML = enemyHands.map(h => `<div class="slot" style="background:#400">${h.toUpperCase()}</div>`).join('');
}

function addCmd(c) { if(myHands.length < 5) { myHands.push(c); updateUI(); } }
function resetCmd() { myHands = []; enemyHands = []; updateUI(); }

function resolveBattle() {
    if(myHands.length < 5) return;
    enemyHands = Array.from({length: 5}, () => ['punch','upper','guard'][Math.floor(Math.random()*3)]);
    updateUI();
    // ここでループを回してキャラの画像を切り替え
    let i = 0;
    let interval = setInterval(() => {
        let m = myHands[i];
        if(m === 'upper') { s.pAir = true; s.pVy = -20; s.pCur = 'upper'; }
        else if(m === 'punch') { s.pCur = 'punch'; }
        else { s.pCur = 'player'; }
        i++;
        if(i >= 5) clearInterval(interval);
    }, 500);
}

function loop() {
    ctx.fillStyle = '#0a192f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (s.pAir) { s.pVy += 1.5; s.pY += s.pVy; if(s.pY >= 0) { s.pY = 0; s.pAir = false; s.pCur = 'player'; } }
    
    // 画像ロード待機・描画
    if(imgs[s.pCur]?.complete) ctx.drawImage(imgs[s.pCur], 200, 200 + s.pY, 240, 240);
    ctx.save(); ctx.scale(-1, 1);
    if(imgs[s.eCur]?.complete) ctx.drawImage(imgs[s.eCur], -750, 200, 240, 240);
    ctx.restore();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
